    body { font-family: system-ui, -apple-system, sans-serif; background: #faf8f5; margin: 0; color: #333; }
    .btn { padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
    .btn-primary { background: var(--orange); color: white; }
    .btn-primary:hover { background: #a83f1e; transform: translateY(-1px); }
    .btn-secondary { background: #e8e8e8; color: #333; }
    .btn-secondary:hover { background: #d0d0d0; }
    .btn-outline { background: transparent; border: 1px solid var(--orange); color: var(--orange); }
    .btn-outline:hover { background: #fff5f0; }
    .btn-small { padding: 6px 12px; font-size: 12px; }
    .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-primary { background: #e8f4f8; color: var(--blue); }
    .badge-success { background: #e8f5e9; color: var(--green); }
    .badge-warning { background: #fff3e0; color: #e65100; }
    .chip { display: inline-flex; align-items: center; padding: 6px 12px; background: #f0f0f0; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; margin-right: 6px; margin-bottom: 6px; }
    .chip.active { background: var(--orange); color: white; border-color: var(--orange); }
    .chip:hover { background: #e0e0e0; }
    .chip.active:hover { background: #a83f1e; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
    .modal.active { display: flex; align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 32px; border-radius: 12px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
    .tab { padding: 12px 20px; border: none; background: transparent; cursor: pointer; font-weight: 500; border-bottom: 3px solid transparent; color: #666; transition: all 0.2s; }
    .tab.active { border-bottom-color: var(--orange); color: var(--orange); }
    .input { padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
    .input:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 3px rgba(196,101,42,0.1); }
    .hero { background: linear-gradient(135deg, var(--orange) 0%, var(--green) 100%); color: white; padding: 80px 20px; text-align: center; }
    .hero-title { font-size: 48px; font-weight: 700; margin-bottom: 16px; }
    .hero-subtitle { font-size: 20px; opacity: 0.95; margin-bottom: 32px; }
    .map-container { width: 100%; height: 500px; border-radius: 8px; overflow: hidden; }
    .property-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; padding: 24px; }
    .property-card { cursor: pointer; height: 100%; }
    .property-card-image { width: 100%; height: 200px; background-size: cover; background-position: center; position: relative; display: flex; align-items: flex-end; padding: 16px; }
    .property-card-overlay { background: rgba(0,0,0,0.6); color: white; padding: 12px; border-radius: 4px; width: 100%; }
    .property-card-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
    .property-card-type { font-size: 12px; opacity: 0.9; }
    .property-card-info { padding: 16px; }
    .price { font-size: 24px; font-weight: 700; color: var(--orange); margin-bottom: 8px; }
    .stars { color: #ffc107; font-size: 14px; margin-bottom: 8px; }
    .amenities-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .amenity-chip { font-size: 11px; padding: 4px 8px; background: #f0f0f0; border-radius: 12px; color: #666; }
    .nav { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .nav-logo { font-size: 20px; font-weight: 700; color: var(--orange); cursor: pointer; }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-link { color: #333; text-decoration: none; cursor: pointer; font-weight: 500; transition: color 0.2s; }
    .nav-link:hover { color: var(--orange); }
    .nav-link.active { color: var(--orange); border-bottom: 2px solid var(--orange); padding-bottom: 2px; }
    select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; }
    .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--orange); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .stats-bar { background: white; padding: 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; text-align: center; margin: 32px 0; }
    .stat { padding: 16px; }
    .stat-number { font-size: 32px; font-weight: 700; color: var(--orange); }
    .stat-label { font-size: 14px; color: #666; margin-top: 4px; }
    .pagination { display: flex; justify-content: center; gap: 4px; padding: 24px; flex-wrap: wrap; }
    .pagination button { padding: 8px 12px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; min-width: 36px; }

    .contact-section { background: #f9f9f9; padding: 24px; border-radius: 8px; margin-top: 24px; }

    .view-toggle { display: flex; gap: 4px; background: #f0f0f0; border-radius: 8px; padding: 4px; }
    .view-toggle button { padding: 8px 16px; border: none; background: transparent; cursor: pointer; border-radius: 6px; font-weight: 500; }
    .view-toggle button.active { background: white; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .split-view { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 200px); }
    .split-view .list-panel { overflow-y: auto; padding: 24px; }
    .map-legend { background: white; padding: 16px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 400; position: absolute; bottom: 20px; right: 20px; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; }

    .footer { background: #333; color: #ccc; padding: 32px 24px; text-align: center; font-size: 13px; margin-top: 32px; }

    .search-filters { background: white; padding: 24px; border-radius: 8px; margin-bottom: 24px; }

    textarea:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 3px rgba(196,101,42,0.1); }

</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;
    const e = React.createElement;

    /* ---- PRICING MATRIX ---- */
    const PRICE_MATRIX = {

    const STAR_MULTIPLIERS = { 0: 0.7, 1: 0.7, 2: 0.85, 3: 1.0, 4: 1.3, 5: 1.8 };
    const REGION_CENTERS = {
      0: [41.9, 12.5, 9],

    const REGION_PHOTOS = {

      1: 'https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1200&h=600&fit=crop',

      4: 'https://images.unsplash.com/photo-1537631468332-b93e15cbc7e4?w=1200&h=600&fit=crop'
    };
    const PROPERTY_PHOTOS = {
      0: 'https://images.unsplash.com/photo-1566073771259-6a8506099945?w=400&h=250&fit=crop',
      1: 'https://images.unsplash.com/photo-1582719508461-905c673771fd?w=400&h=250&fit=crop',
      2: 'https://images.unsplash.com/photo-1510798831971-661eb04b3739?w=400&h=250&fit=crop',
      3: 'https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?w=400&h=250&fit=crop',
      4: 'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=400&h=250&fit=crop',
      5: 'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=400&h=250&fit=crop',
      6: 'https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=400&h=250&fit=crop',
      7: 'https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=400&h=250&fit=crop'
    };

    /* ---- NEIGHBORHOOD MAPPING ---- */
    const ROME_CAP_NEIGHBORHOODS = {
      '00186': 'Centro Storico', '00187': 'Trevi / Via Veneto', '00184': 'Monti / Esquilino',
      '00185': 'Esquilino / Termini', '00153': 'Trastevere / Testaccio', '00193': 'Prati / Vaticano',
      '00192': 'Flaminio / Parioli', '00196': 'Parioli', '00197': 'Parioli / Salario',
      '00198': 'Nomentano / Salario', '00199': 'Villa Ada', '00100': 'Centro Storico',
      '00118': 'Appia Antica', '00120': 'Acilia / Ostia', '00121': 'Ostia Lido',
      '00122': 'EUR / Torrino', '00123': 'Magliana / Portuense', '00124': 'Casalotti / Boccea',
      '00125': 'Acilia Sud', '00126': 'Casal Palocco', '00127': 'Torrino Sud',
      '00128': 'Trigoria / Falcognana', '00131': 'Settecamini', '00132': 'Tor Vergata / Romanina',
      '00133': 'Torre Angela / Tor Bella Monaca', '00134': 'Casal Morena / Ciampino',
      '00135': 'Casalpalocco / Axa', '00136': 'Primavalle / Torrevecchia', '00137': 'Cassia / Tomba di Nerone',
      '00138': 'Labaro / Prima Porta', '00139': 'Fidene / Serpentara', '00141': 'Conca d\'Oro / Val Melaina',
      '00142': 'Tor Marancia / Montagnola', '00143': 'EUR / Laurentino', '00144': 'EUR',
      '00145': 'Ostiense / Garbatella', '00146': 'Aventino / San Saba', '00147': 'Ostiense',
      '00148': 'Mostacciano / Spinaceto', '00149': 'Portuense / Magliana Vecchia',
      '00151': 'Gianicolense / Monteverde', '00152': 'Monteverde', '00154': 'Testaccio / Piramide',
      '00155': 'Centocelle / Prenestino', '00156': 'Torrenova / Torre Gaia',
      '00157': 'Casal Bertone', '00158': 'Quarticciolo', '00159': 'Colli Aniene',
      '00161': 'Nomentano', '00162': 'Bologna / Tiburtina', '00164': 'Aurelio / Boccea',
      '00165': 'Aurelio / Gregorio VII', '00166': 'Aurelio / Pineta Sacchetti',
      '00167': 'Balduina / Medaglie d\'Oro', '00168': 'Primavalle', '00169': 'Casilino',
      '00171': 'Centocelle', '00172': 'Don Bosco / Cinecitt\u00e0', '00173': 'Appio Latino / Quarto Miglio',
      '00174': 'Romanina', '00175': 'Appio Tuscolano', '00176': 'Pigneto / Torpignattara',
      '00177': 'Tuscolano', '00178': 'Capannelle', '00179': 'Statuario / Capannelle',
      '00181': 'Appio / Re di Roma', '00182': 'San Giovanni / Appio',
      '00183': 'Celio / Colosseo', '00188': 'Flaminio', '00189': 'Acqua Acetosa',
      '00191': 'Della Vittoria', '00194': 'Prati', '00195': 'Della Vittoria / Monte Mario'
    };
    const VENICE_CAP_SESTIERI = {
      '30121': 'Cannaregio', '30122': 'Castello', '30123': 'Dorsoduro',
      '30124': 'San Marco', '30125': 'San Polo', '30126': 'Santa Croce',
      '30100': 'Venezia Centro', '30131': 'Mestre / Marghera', '30170': 'Mestre / Marghera',
      '30171': 'Mestre', '30172': 'Mestre', '30173': 'Favaro Veneto', '30174': 'Zelarino',
      '30175': 'Marghera', '30176': 'Chirignago'
    };
    const ROME_STREET_NEIGHBORHOODS = {
      'trastevere': 'Trastevere', 'monti': 'Monti', 'prati': 'Prati', 'testaccio': 'Testaccio',
      'san lorenzo': 'San Lorenzo', 'pigneto': 'Pigneto', 'flaminio': 'Flaminio',
      'parioli': 'Parioli', 'aventino': 'Aventino', 'garbatella': 'Garbatella',
      'monteverde': 'Monteverde', 'ostiense': 'Ostiense', 'eur': 'EUR',
      'colosseo': 'Colosseo', 'vaticano': 'Vaticano', 'borgo': 'Borgo',
      'navona': 'Centro Storico', 'pantheon': 'Centro Storico', 'campo de\' fiori': 'Centro Storico',
      'trevi': 'Trevi', 'termini': 'Esquilino / Termini', 'tiburtina': 'Tiburtino',
      'nomentano': 'Nomentano', 'celio': 'Celio / Colosseo', 'esquilino': 'Esquilino / Termini',
      'cola di rienzo': 'Prati / Vaticano', 'piazza del popolo': 'Flaminio',
      'corso': 'Centro Storico', 'condotti': 'Centro Storico', 'babuino': 'Centro Storico',
      'ottaviano': 'Prati / Vaticano', 'cipro': 'Prati / Vaticano',
      'san giovanni': 'San Giovanni', 'appia': 'Appio', 'tuscolana': 'Tuscolano',
      'prenestina': 'Prenestino', 'casilina': 'Casilino', 'ardeatina': 'Ardeatino',
      'laurentina': 'Laurentino', 'portuense': 'Portuense', 'aurelia': 'Aurelio',
      'cassia': 'Cassia', 'salaria': 'Salario', 'campitelli': 'Centro Storico',
      'dorsoduro': 'Dorsoduro', 'cannaregio': 'Cannaregio', 'castello': 'Castello',
      'san marco': 'San Marco', 'san polo': 'San Polo', 'santa croce': 'Santa Croce',
      'giudecca': 'Giudecca', 'murano': 'Murano', 'burano': 'Burano', 'lido': 'Lido'
    };

    function getNeighborhood(prop) {
      // Venice: use CAP then address
      if (prop.comune === 'VENEZIA' || prop.comune === 'Venezia') {
        if (VENICE_CAP_SESTIERI[prop.cap]) return VENICE_CAP_SESTIERI[prop.cap];
        const addr = ((prop.street || '') + ' ' + (prop.number || '')).toLowerCase();
        for (const [key, hood] of Object.entries(ROME_STREET_NEIGHBORHOODS)) {
          if (addr.includes(key)) return hood;
        }
        return 'Venezia';
      }
      // Rome: use CAP then street name matching
      if (prop.comune === 'Roma' || prop.comune === 'ROMA') {
        if (ROME_CAP_NEIGHBORHOODS[prop.cap]) return ROME_CAP_NEIGHBORHOODS[prop.cap];
        const addr = ((prop.street || '') + ' ' + (prop.number || '')).toLowerCase();
        for (const [key, hood] of Object.entries(ROME_STREET_NEIGHBORHOODS)) {
          if (addr.includes(key)) return hood;
        }
        return 'Roma (altri)';
      }
      // Other: just use comune as neighborhood
      return prop.comune;
    }

    const AMENITY_LABELS = {
      wifi: 'WiFi', ac: 'A/C', pool: 'Pool', paidParking: 'Paid Parking',
      freeParking: 'Free Parking', restaurant: 'Restaurant', bar: 'Bar',
      elevator: 'Elevator', garage: 'Garage', tv: 'TV', pets: 'Pets Allowed',
      disability: 'Accessible', sauna: 'Sauna', tennis: 'Tennis',
      bikeRental: 'Bike Rental', indoorPool: 'Indoor Pool', gym: 'Gym',
      conference: 'Conference', park: 'Park/Garden', laundry: 'Laundry', shuttle: 'Shuttle'
    };

    function hashCode(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return Math.abs(hash);
    }

    function calculatePrice(prop) {
      let base = PRICE_MATRIX[prop.regionCode][prop.typeCode] || 80;
      const starMult = STAR_MULTIPLIERS[prop.stars] || 1;
      let price = base * starMult;
      if (prop.beds > 100) price *= 1.2;
      else if (prop.beds > 20) price *= 1.1;
      const variation = 0.9 + ((hashCode(prop.id) % 20) / 100);
      price *= variation;
      return Math.round(price);
    }

    function parseListings() {
      if (!window.RAW_DATA) return [];
      const CLAIMED_IDS = new Set([
        'IT000001','IT000005','IT000010','IT000020','IT000050',
        'IT000100','IT000200','IT000500','IT001000','IT002000',
        'IT003000','IT005000','IT010000','IT015000'
      ]);
      return window.RAW_DATA.map(d => {
        const amenBits = d[16] || 0;
        const langBits = d[17] || 0;
        const propId = d[0];
        return {
          id: propId,
          region: window.REGIONS[d[1]],
          regionCode: d[1],
          provincia: window.PROVINCES[d[2]],
          provinciaCode: d[2],
          comune: d[3],
          type: window.PROPERTY_TYPES[d[4]],
          typeCode: d[4],
          name: d[5],
          street: d[6],
          number: d[7],
          cap: d[8],
          lat: d[9],
          lon: d[10],
          stars: d[11] || 0,
          beds: d[12] || 0,
          rooms: d[13] || 0,
          baths: d[14] || 0,
          website: d[15] || '',
          amenities: {
            wifi: !!(amenBits & 1), ac: !!(amenBits & 2), pool: !!(amenBits & 4),
            paidParking: !!(amenBits & 8), freeParking: !!(amenBits & 16),
            restaurant: !!(amenBits & 32), bar: !!(amenBits & 64),
            elevator: !!(amenBits & 128), garage: !!(amenBits & 256),
            tv: !!(amenBits & 512), pets: !!(amenBits & 1024),
            disability: !!(amenBits & 2048), sauna: !!(amenBits & 4096),
            tennis: !!(amenBits & 8192), bikeRental: !!(amenBits & 16384),
            indoorPool: !!(amenBits & 32768), gym: !!(amenBits & 131072),
            conference: !!(amenBits & 262144), park: !!(amenBits & 524288),
            laundry: !!(amenBits & 1048576), shuttle: !!(amenBits & 2097152)
          },
          languages: {
            en: !!(langBits & 1), fr: !!(langBits & 2), de: !!(langBits & 4),
            es: !!(langBits & 8), ru: !!(langBits & 16), zh: !!(langBits & 32)
          },
          claimed: CLAIMED_IDS.has(propId),
          verified: CLAIMED_IDS.has(propId)
        };
      }).map(p => ({ ...p, price: calculatePrice(p), neighborhood: getNeighborhood(p) }));
    }

    function ensureUrl(url) {
      if (!url) return '';
      if (url.startsWith('http://') || url.startsWith('https://')) return url;
      return 'https://' + url;
    }

    function getCardImage(prop) {
      if (prop.website) {
        return 'https://image.thum.io/get/width/400/' + ensureUrl(prop.website);
      }
      return PROPERTY_PHOTOS[prop.typeCode] || PROPERTY_PHOTOS[7];
    }

    function getHeroImage(prop) {
      if (prop.website) {
        return 'https://image.thum.io/get/width/1200/' + ensureUrl(prop.website);
      }
      return REGION_PHOTOS[prop.regionCode] || REGION_PHOTOS[0];
    }

    function buildComunesByRegion(listings) {
      const map = {};
      listings.forEach(l => {
        if (!map[l.regionCode]) map[l.regionCode] = new Set();
        map[l.regionCode].add(l.comune);
      });
      Object.keys(map).forEach(k => { map[k] = Array.from(map[k]).sort(); });
      return map;
    }

    function buildNeighborhoodsByComune(listings) {
      const map = {};
      listings.forEach(l => {
        const key = l.regionCode + ':' + l.comune;
        if (!map[key]) map[key] = new Set();
        map[key].add(l.neighborhood);
      });
      Object.keys(map).forEach(k => { map[k] = Array.from(map[k]).sort(); });
      return map;
    }

    function getTopAmenities(prop, limit = 3) {
      const amenities = Object.entries(prop.amenities).filter(([,v]) => v).map(([k]) => AMENITY_LABELS[k]);
      return amenities.slice(0, limit);
    }

    function renderStars(stars) {
      return '★'.repeat(stars) + '☆'.repeat(5 - stars);
    }

    function smartPagination(current, total) {
      const pages = [];
      const maxShow = 7;
      if (total <= maxShow) {
        for (let i = 1; i <= total; i++) pages.push(i);
      } else {
        pages.push(1);
        const start = Math.max(2, current - 2);
        const end = Math.min(total - 1, current + 2);
        if (start > 2) pages.push('...');
        for (let i = start; i <= end; i++) pages.push(i);
        if (end < total - 1) pages.push('...');

      const [minStars, setMinStars] = useState(0);
      const [page, setPage] = useState(1);

      const comunesByRegion = useMemo(() => buildComunesByRegion(listings), [listings]);
      const neighborhoodsByComune = useMemo(() => buildNeighborhoodsByComune(listings), [listings]);

      const availableNeighborhoods = useMemo(() => {
        if (selectedRegion === null || !selectedComune) return [];
        const key = selectedRegion + ':' + selectedComune;
        return neighborhoodsByComune[key] || [];
      }, [selectedRegion, selectedComune, neighborhoodsByComune]);

      const filtered = useMemo(() => {
        return listings.filter(l => {
          if (selectedRegion !== null && l.regionCode !== selectedRegion) return false;
          if (selectedProvince !== null && l.provinciaCode !== selectedProvince) return false;
          if (selectedComune && l.comune !== selectedComune) return false;
          if (selectedNeighborhood && l.neighborhood !== selectedNeighborhood) return false;
          if (selectedTypes.size > 0 && !selectedTypes.has(l.typeCode)) return false;
          if (selectedAmenities.size > 0) {
            for (let amen of selectedAmenities) {
              const [key] = Object.entries(AMENITY_LABELS).find(([, v]) => v === amen) || [];
              if (!key || !l.amenities[key]) return false;
            }
          }
          if (l.price > maxPrice) return false;
          if (l.beds < minBeds) return false;
          if (l.stars < minStars) return false;
          return true;
        });
      }, [listings, selectedRegion, selectedProvince, selectedComune, selectedNeighborhood, selectedTypes, selectedAmenities, maxPrice, minBeds, minStars]);

      const pageSize = 12;
      const totalPages = Math.ceil(filtered.length / pageSize);
      const paged = filtered.slice((page - 1) * pageSize, page * pageSize);

      const handleRegionChange = (e) => {
        const val = e.target.value ? parseInt(e.target.value) : null;
        setSelectedRegion(val);
        setSelectedProvince(null);
        setSelectedComune(null);
        setSelectedNeighborhood(null);
        setPage(1);

        setPage(1);

        setPage(1);
      };

      const toggleAmenity = (label) => {

        else newSet.add(label);
        setSelectedAmenities(newSet);
        setPage(1);

      return e('div', null,

              ),
              e('div', { className: 'filter-group' },
                e('label', null, 'Province'),

              ),
              e('div', { className: 'filter-group' },

                e('select', { value: selectedComune || '', onChange: (e) => { setSelectedComune(e.target.value || null); setSelectedNeighborhood(null); setPage(1); }, disabled: selectedRegion === null },

        ),
        Footer({})
      );

    /* ---- MAP PAGE ---- */
    function MapPage({ listings }) {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const markersRef = useRef([]);
      const [selectedRegion, setSelectedRegion] = useState(null);
      const [selectedComune, setSelectedComune] = useState(null);

      const comunesByRegion = useMemo(() => buildComunesByRegion(listings), [listings]);

      const availableNeighborhoods = useMemo(() => {
        if (selectedRegion === null || !selectedComune) return [];
        return neighborhoodsByComune[selectedRegion + ':' + selectedComune] || [];
      }, [selectedRegion, selectedComune, neighborhoodsByComune]);

      const filtered = useMemo(() => {
        let res = listings;
        if (selectedRegion !== null) res = res.filter(l => l.regionCode === selectedRegion);
        if (selectedComune) res = res.filter(l => l.comune === selectedComune);
        if (selectedNeighborhood) res = res.filter(l => l.neighborhood === selectedNeighborhood);
        return res.slice(0, 1000);
      }, [listings, selectedRegion, selectedComune, selectedNeighborhood]);

      useEffect(() => {
        if (!mapRef.current) return;
        if (!mapInstanceRef.current) {
          mapInstanceRef.current = L.map(mapRef.current).setView([42.5, 12.5], 6);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
            maxZoom: 19
          }).addTo(mapInstanceRef.current);
        }

        markersRef.current.forEach(m => mapInstanceRef.current.removeLayer(m));
        markersRef.current = [];

        const map = mapInstanceRef.current;
        filtered.forEach(prop => {
          if (!prop.lat || !prop.lon) return;
          const color = prop.claimed ? '#2a6847' : (prop.website ? '#1e5f8c' : '#c0392b');
          const circle = L.circleMarker([prop.lat, prop.lon], {
            radius: 6,
            fillColor: color,
            color: color,
            weight: 1,
            opacity: 0.8,
            fillOpacity: 0.7
          }).bindPopup(prop.name + ' - ' + prop.type);
          circle.addTo(map);
          markersRef.current.push(circle);
        });

        if (selectedRegion !== null && REGION_CENTERS[selectedRegion]) {
          const [lat, lon, zoom] = REGION_CENTERS[selectedRegion];
          map.setView([lat, lon], zoom);
        }
      }, [filtered, selectedRegion]);

      useEffect(() => {
        return () => {
          if (mapInstanceRef.current) {
            mapInstanceRef.current.remove();
            mapInstanceRef.current = null;
          }
        };

      const availableProvinces = selectedRegion !== null ?

              e('label', null, 'Region'),
              e('select', { value: selectedRegion ?? '', onChange: (e) => { setSelectedRegion(e.target.value ? parseInt(e.target.value) : null); setSelectedComune(null); setSelectedNeighborhood(null); } },
                e('option', { value: '' }, '-- Any Region --'),
                Object.entries(window.REGIONS).map(([code, name]) => e('option', { key: code, value: code }, name))
              )
            ),
            e('div', { className: 'filter-group' },
              e('label', null, 'Comune'),
              e('select', { value: selectedComune || '', onChange: (e) => { setSelectedComune(e.target.value || null); setSelectedNeighborhood(null); }, disabled: selectedRegion === null },
                e('option', { value: '' }, '-- Any Comune --'),

              )

              )
            )
          ),
          e('div', { style: { fontSize: '14px', color: '#666', marginTop: '16px' } },
            'Showing ' + filtered.length + ' of ' + listings.length + ' properties'

                  e('div', { style: { marginBottom: '12px' } },
                    e('label', { style: { fontSize: '12px', fontWeight: '600' } }, 'Check-Out'),
                    e('input', { type: 'date', className: 'input', value: proposalData.checkOut, onChange: (e) => setProposalData({...proposalData, checkOut: e.target.value }) })
                  ),
                  e('div', { style: { marginBottom: '12px' } },
                    e('input', { type: 'number', className: 'input', placeholder: 'Guests', min: 1, value: proposalData.guests, onChange: (e) => setProposalData({...proposalData, guests: parseInt(e.target.value) }) })
                  ),
                  e('div', { style: { marginBottom: '12px' } },
                    e('textarea', { className: 'input', placeholder: 'Message (optional)', rows: 4, value: proposalData.message, onChange: (e) => setProposalData({...proposalData, message: e.target.value }) })
                  ),
                  e('button', { className: 'btn btn-primary', style: { width: '100%' }, onClick: handleProposalSubmit }, 'Send Proposal')
                )
              )
            )
          )
        ),
        Footer({})
      );
    }

    function MapEmbed({ lat, lon }) {
      const mapRef = useRef(null);
      useEffect(() => {
        if (!mapRef.current) return;
        const map = L.map(mapRef.current).setView([lat, lon], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        L.circleMarker([lat, lon], { radius: 8, color: 'var(--orange)', fillColor: 'var(--orange)', fillOpacity: 0.7 }).addTo(map);
        return () => map.remove();
      }, [lat, lon]);
      return e('div', { ref: mapRef, style: { width: '100%', height: '100%' } });
    }

    /* ---- LOGIN/SIGNUP ---- */
    function LoginPage({ onNavigate, user }) {
      const [mode, setMode] = useState('login');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [name, setName] = useState('');
      const [userType, setUserType] = useState('tourist');

      const handleSubmit = () => {
        if (!email || !password || (mode === 'signup' && !name)) {
          alert('Please fill all fields');
          return;
        }
        let users = JSON.parse(localStorage.getItem('ad_users') || '[]');
        if (mode === 'login') {
          const found = users.find(u => u.email === email && u.password === password);
          if (!found) { alert('Invalid credentials'); return; }
          localStorage.setItem('ad_current_user', JSON.stringify(found));
          onNavigate('home');
        } else {
          if (users.some(u => u.email === email)) { alert('Email already registered'); return; }
          const newUser = { id: 'user_' + Date.now(), name, email, password, userType, created: new Date().toISOString() };
          users.push(newUser);
          localStorage.setItem('ad_users', JSON.stringify(users));
          localStorage.setItem('ad_current_user', JSON.stringify(newUser));
          onNavigate('home');
        }
      };

      return e('div', { style: { maxWidth: '500px', margin: '60px auto', padding: '24px' } },
        e('div', { className: 'card', style: { padding: '32px' } },
          e('h1', { style: { textAlign: 'center', marginBottom: '24px' } }, mode === 'login' ? 'Login' : 'Sign Up'),
          e('div', { style: { marginBottom: '20px', display: 'flex', gap: '12px', justifyContent: 'center' } },
            e('button', { className: 'btn' + (mode === 'login' ? ' btn-primary' : ' btn-secondary'), onClick: () => setMode('login') }, 'Login'),
            e('button', { className: 'btn' + (mode === 'signup' ? ' btn-primary' : ' btn-secondary'), onClick: () => setMode('signup') }, 'Sign Up')
          ),
          mode === 'signup' && e('div', { style: { marginBottom: '12px' } },
            e('label', { style: { display: 'block', marginBottom: '8px', fontWeight: '600' } }, 'I am a...'),
            e('select', { value: userType, onChange: (e) => setUserType(e.target.value), className: 'input' },
              e('option', { value: 'tourist' }, 'Traveler/Guest'),
              e('option', { value: 'owner' }, 'Property Owner')
            )
          ),
          mode === 'signup' && e('input', { type: 'text', className: 'input', placeholder: 'Full Name', value: name, onChange: (e) => setName(e.target.value), style: { marginBottom: '12px' } }),
          e('input', { type: 'email', className: 'input', placeholder: 'Email', value: email, onChange: (e) => setEmail(e.target.value), style: { marginBottom: '12px' } }),
          e('input', { type: 'password', className: 'input', placeholder: 'Password', value: password, onChange: (e) => setPassword(e.target.value), style: { marginBottom: '12px' } }),
          e('button', { className: 'btn btn-primary', onClick: handleSubmit, style: { width: '100%', marginBottom: '12px' } }, mode === 'login' ? 'Login' : 'Create Account'),
          e('div', { style: { textAlign: 'center', fontSize: '13px', color: '#666' } },
            mode === 'login' ? 'No account? ' : 'Have account? ',
            e('a', { onClick: () => { setMode(mode === 'login' ? 'signup' : 'login'); setEmail(''); setPassword(''); setName(''); }, style: { color: 'var(--orange)', cursor: 'pointer', textDecoration: 'none' } }, mode === 'login' ? 'Sign up' : 'Login')
          )
        ),
        Footer({})
      );
    }

    /* ---- DASHBOARD ---- */
    function Dashboard({ user, listings, onNavigate }) {
      const [activeTab, setActiveTab] = useState('profile');

      return e('div', { style: { maxWidth: '1000px', margin: '0 auto', padding: '32px 24px' } },
        e('h1', { style: { marginBottom: '24px' } }, 'Dashboard'),
        e('div', null,
          e('button', { className: 'tab' + (activeTab === 'profile' ? ' active' : ''), onClick: () => setActiveTab('profile') }, 'Profile'),
          user.userType === 'owner' && e('button', { className: 'tab' + (activeTab === 'properties' ? ' active' : ''), onClick: () => setActiveTab('properties') }, 'My Properties'),
          e('button', { className: 'tab' + (activeTab === 'proposals' ? ' active' : ''), onClick: () => setActiveTab('proposals') }, 'Proposals')
        ),
        e('div', { style: { marginTop: '24px', padding: '24px', background: 'white', borderRadius: '8px' } },
          activeTab === 'profile' && e('div', null,
            e('h2', null, 'Profile'),
            e('p', null, 'Name: ' + user.name),
            e('p', null, 'Email: ' + user.email),
            e('p', null, 'Type: ' + (user.userType === 'owner' ? 'Property Owner' : 'Traveler')),
            e('p', { style: { fontSize: '13px', color: '#666' } }, 'Member since ' + new Date(user.created).toLocaleDateString())
          ),
          activeTab === 'properties' && e('div', null,
            e('h2', null, 'My Properties'),
            e('p', { style: { color: '#666' } }, 'You have not yet claimed any properties.')
          ),
          activeTab === 'proposals' && e('div', null,
            e('h2', null, 'My Proposals'),
            e('p', { style: { color: '#666' } }, 'You have no submitted proposals yet.')
          )
        ),
        Footer({})
      );
    }

    function Footer() {
      return e('footer', { className: 'footer' },
        e('p', null, '© 2026 AffittoDiretto.it - Direct booking platform for Italy'),
        e('p', { style: { fontSize: '12px', marginTop: '8px' } }, 'No commission. Book directly with property owners.')
      );
    }

    /* ---- MAIN APP ---- */
    function App() {
      const [page, setPage] = useState('home');
      const [listings, setListings] = useState([]);
      const [loading, setLoading] = useState(true);
      const [user, setUser] = useState(null);

      useEffect(() => {
        const parsed = parseListings();
        setListings(parsed);
        setLoading(false);
        const stored = localStorage.getItem('ad_current_user');
        if (stored) setUser(JSON.parse(stored));
        window.scrollTo(0, 0);
      }, []);

      const handleNavigate = (newPage) => {
        setPage(newPage);
        window.scrollTo(0, 0);
      };

      const handlePropertyClick = (propId) => {
        const prop = listings.find(l => l.id === propId);
        if (prop) {
          sessionStorage.setItem('ad_current_property', JSON.stringify(prop));
          handleNavigate('detail');
        }
      };

      if (loading) return e('div', { style: { padding: '40px', textAlign: 'center' } }, e('div', { className: 'spinner' }), e('p', { style: { marginTop: '20px' } }, 'Loading 63,000 properties...'));

      const currentProp = page === 'detail' ? JSON.parse(sessionStorage.getItem('ad_current_property') || 'null') : null;

      return e('div', null,
        Nav({ onNavigate: handleNavigate, currentPage: page, user }),
        page === 'home' && HomePage({ listings, onNavigate: handleNavigate, onPropertyClick: handlePropertyClick }),
        page === 'search' && SearchPage({ listings, onPropertyClick: handlePropertyClick, onNavigate: handleNavigate }),
        page === 'map' && MapPage({ listings }),
        page === 'detail' && currentProp && PropertyDetail({ prop: currentProp, onNavigate: handleNavigate, user }),
        page === 'login' && LoginPage({ onNavigate: handleNavigate, user }),
        page === 'dashboard' && user && Dashboard({ user, listings, onNavigate: handleNavigate })
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>
</html>
