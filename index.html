<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AffittoDiretto.it - Book Direct in Italy</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="data_public.js"></script>
  <style>
    :root {
      --orange: #c4652a;
      --green: #2a6847;
      --blue: #1e5f8c;
      --purple: #6b3fa0;
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: #faf8f5; margin: 0; color: #333; }
    .btn { padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
    .btn-primary { background: var(--orange); color: white; }
    .btn-primary:hover { background: #a83f1e; transform: translateY(-1px); }
    .btn-secondary { background: #e8e8e8; color: #333; }
    .btn-secondary:hover { background: #d0d0d0; }
    .btn-outline { background: transparent; border: 1px solid var(--orange); color: var(--orange); }
    .btn-outline:hover { background: #fff5f0; }
    .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-primary { background: #e8f4f8; color: var(--blue); }
    .badge-success { background: #e8f5e9; color: var(--green); }
    .badge-warning { background: #fff3e0; color: #e65100; }
    .chip { display: inline-flex; align-items: center; padding: 6px 12px; background: #f0f0f0; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; margin-right: 6px; margin-bottom: 6px; }
    .chip.active { background: var(--orange); color: white; border-color: var(--orange); }
    .chip:hover { background: #e0e0e0; }
    .chip.active:hover { background: #a83f1e; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
    .modal.active { display: flex; align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 32px; border-radius: 12px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
    .tab { padding: 12px 20px; border: none; background: transparent; cursor: pointer; font-weight: 500; border-bottom: 3px solid transparent; color: #666; transition: all 0.2s; }
    .tab.active { border-bottom-color: var(--orange); color: var(--orange); }
    .input { padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
    .input:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 3px rgba(196,101,42,0.1); }
    .hero { background: linear-gradient(135deg, var(--orange) 0%, var(--green) 100%); color: white; padding: 80px 20px; text-align: center; }
    .hero-title { font-size: 48px; font-weight: 700; margin-bottom: 16px; }
    .hero-subtitle { font-size: 20px; opacity: 0.95; margin-bottom: 32px; }
    .map-container { width: 100%; height: 500px; border-radius: 8px; overflow: hidden; }
    .property-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; padding: 24px; }
    .property-card { cursor: pointer; height: 100%; }
    .property-card-image { width: 100%; height: 200px; background-size: cover; background-position: center; position: relative; display: flex; align-items: flex-end; padding: 16px; }
    .property-card-overlay { background: rgba(0,0,0,0.6); color: white; padding: 12px; border-radius: 4px; width: 100%; }
    .property-card-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
    .property-card-type { font-size: 12px; opacity: 0.9; }
    .property-card-info { padding: 16px; }
    .price { font-size: 24px; font-weight: 700; color: var(--orange); margin-bottom: 8px; }
    .stars { color: #ffc107; font-size: 14px; margin-bottom: 8px; }
    .amenities-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .amenity-chip { font-size: 11px; padding: 4px 8px; background: #f0f0f0; border-radius: 12px; color: #666; }
    .nav { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .nav-logo { font-size: 20px; font-weight: 700; color: var(--orange); cursor: pointer; }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-link { color: #333; text-decoration: none; cursor: pointer; font-weight: 500; transition: color 0.2s; }
    .nav-link:hover { color: var(--orange); }
    .nav-link.active { color: var(--orange); border-bottom: 2px solid var(--orange); padding-bottom: 2px; }
    select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; }
    .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--orange); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .stats-bar { background: white; padding: 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; text-align: center; margin: 32px 0; }
    .stat { padding: 16px; }
    .stat-number { font-size: 32px; font-weight: 700; color: var(--orange); }
    .stat-label { font-size: 14px; color: #666; margin-top: 4px; }
    .pagination { display: flex; justify-content: center; gap: 4px; padding: 24px; flex-wrap: wrap; }
    .pagination button { padding: 8px 12px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; min-width: 36px; }
    .pagination button.active { background: var(--orange); color: white; border-color: var(--orange); }
    .contact-section { background: #f9f9f9; padding: 24px; border-radius: 8px; margin-top: 24px; }
    .contact-buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
    .view-toggle { display: flex; gap: 4px; background: #f0f0f0; border-radius: 8px; padding: 4px; }
    .view-toggle button { padding: 8px 16px; border: none; background: transparent; cursor: pointer; border-radius: 6px; font-weight: 500; }
    .view-toggle button.active { background: white; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .split-view { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 200px); }
    .split-view .list-panel { overflow-y: auto; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;
    const e = React.createElement;

    /* ---- DUMMY DATA ---- */
    const CLAIMED_IDS = new Set([
      'IT000001','IT000005','IT000010','IT000020','IT000050',
      'IT000100','IT000200','IT000500','IT001000','IT002000',
      'IT003000','IT005000','IT010000','IT015000'
    ]);
    const DUMMY_OWNERS = [
      { id: 'owner1', name: 'Marco Rossi', propertyIds: ['IT000001','IT000005'], reviews: 4.8, contactVisibility: 'all', phone: '+39 06 1234 5678', email: 'marco@esempio.it' },
      { id: 'owner2', name: 'Anna Bianchi', propertyIds: ['IT000010','IT000020'], reviews: 4.6, contactVisibility: 'all', phone: '+39 06 9876 5432', email: 'anna@esempio.it' },
      { id: 'owner3', name: 'Giovanni Verdi', propertyIds: ['IT000050'], reviews: 4.7, contactVisibility: 'matches', phone: '+39 06 5555 1111', email: 'giovanni@esempio.it' },
      { id: 'owner4', name: 'Francesca Moretti', propertyIds: ['IT000100','IT000200'], reviews: 4.9, contactVisibility: 'all', phone: '+39 011 2222 3333', email: 'francesca@esempio.it' },
      { id: 'owner5', name: 'Roberto Gallo', propertyIds: ['IT000500'], reviews: 4.5, contactVisibility: 'manual', phone: '+39 011 4444 5555', email: 'roberto@esempio.it' },
      { id: 'owner6', name: 'Lucia Ferrari', propertyIds: ['IT001000'], reviews: 4.8, contactVisibility: 'all', phone: '+39 011 6666 7777', email: 'lucia@esempio.it' },
      { id: 'owner7', name: 'Paolo Rizzo', propertyIds: ['IT002000','IT003000'], reviews: 4.7, contactVisibility: 'matches', phone: '+39 080 1234 5678', email: 'paolo@esempio.it' },
      { id: 'owner8', name: 'Maria Palazzo', propertyIds: ['IT005000'], reviews: 4.9, contactVisibility: 'all', phone: '+39 080 9876 5432', email: 'maria@esempio.it' },
      { id: 'owner9', name: 'Luca Colombo', propertyIds: ['IT010000'], reviews: 4.6, contactVisibility: 'matches', phone: '+39 041 1111 2222', email: 'luca@esempio.it' },
      { id: 'owner10', name: 'Sofia Fontana', propertyIds: ['IT015000'], reviews: 4.8, contactVisibility: 'all', phone: '+39 010 3333 4444', email: 'sofia@esempio.it' }
    ];

    const OWNER_BY_PROP = {};
    DUMMY_OWNERS.forEach(o => o.propertyIds.forEach(pid => { OWNER_BY_PROP[pid] = o; }));

    /* ---- AMENITY LABELS ---- */
    const AMENITY_LABELS = {
      wifi: 'WiFi', ac: 'A/C', pool: 'Pool', paidParking: 'Paid Parking',
      freeParking: 'Free Parking', restaurant: 'Restaurant', bar: 'Bar',
      elevator: 'Elevator', garage: 'Garage', tv: 'TV', pets: 'Pets Allowed',
      disability: 'Accessible', sauna: 'Sauna', tennis: 'Tennis',
      bikeRental: 'Bike Rental', indoorPool: 'Indoor Pool', gym: 'Gym',
      conference: 'Conference', park: 'Park/Garden', laundry: 'Laundry', shuttle: 'Shuttle'
    };

    /* ---- PARSE LISTINGS ---- */
    function parseListings() {
      if (!window.RAW_DATA) return [];
      const seededRandom = (seed) => { let x = Math.sin(seed) * 10000; return x - Math.floor(x); };
      return window.RAW_DATA.map((d, idx) => {
        const amenBits = d[16] || 0;
        const langBits = d[17] || 0;
        let price = 65;
        if (d[11] >= 4) price = 180;
        else if (d[11] === 3) price = 120;
        else if (d[11] === 2) price = 90;
        if (d[4] === 5) price *= 1.3;
        if (d[4] === 1) price *= 0.8;
        price = Math.round(price / 5) * 5;

        const propId = d[0];
        const ownerData = OWNER_BY_PROP[propId] || null;
        const isClaimed = !!ownerData;

        return {
          id: propId,
          region: window.REGIONS[d[1]],
          regionCode: d[1],
          provincia: window.PROVINCES[d[2]],
          provinciaCode: d[2],
          comune: d[3],
          type: window.PROPERTY_TYPES[d[4]],
          typeCode: d[4],
          name: d[5],
          street: d[6],
          number: d[7],
          cap: d[8],
          lat: d[9],
          lon: d[10],
          stars: d[11] || 0,
          beds: d[12] || 0,
          rooms: d[13] || 0,
          baths: d[14] || 0,
          website: d[15] || '',
          amenities: {
            wifi: !!(amenBits & 1), ac: !!(amenBits & 2), pool: !!(amenBits & 4),
            paidParking: !!(amenBits & 8), freeParking: !!(amenBits & 16),
            restaurant: !!(amenBits & 32), bar: !!(amenBits & 64),
            elevator: !!(amenBits & 128), garage: !!(amenBits & 256),
            tv: !!(amenBits & 512), pets: !!(amenBits & 1024),
            disability: !!(amenBits & 2048), sauna: !!(amenBits & 4096),
            tennis: !!(amenBits & 8192), bikeRental: !!(amenBits & 16384),
            indoorPool: !!(amenBits & 32768), gym: !!(amenBits & 131072),
            conference: !!(amenBits & 262144), park: !!(amenBits & 524288),
            laundry: !!(amenBits & 1048576), shuttle: !!(amenBits & 2097152)
          },
          languages: {
            en: !!(langBits & 1), fr: !!(langBits & 2), de: !!(langBits & 4),
            es: !!(langBits & 8), ru: !!(langBits & 16), zh: !!(langBits & 32)
          },
          address: (d[6] || '') + ' ' + (d[7] || '') + ', ' + d[3],
          price,
          claimed: isClaimed,
          verified: isClaimed,
          featured: seededRandom(idx * 7 + 3) > 0.97,
          contactVisibility: isClaimed ? ownerData.contactVisibility : 'hidden',
          ownerName: isClaimed ? ownerData.name : '',
          ownerPhone: isClaimed && ownerData.contactVisibility === 'all' ? ownerData.phone : '',
          ownerEmail: isClaimed && ownerData.contactVisibility === 'all' ? ownerData.email : '',
          ownerId: isClaimed ? ownerData.id : null
        };
      });
    }

    const REGION_PHOTOS = {
      0: 'https://images.unsplash.com/photo-1552832230-c0197dd311b5?w=400&h=250&fit=crop',
      1: 'https://images.unsplash.com/photo-1566073771259-6a8506099945?w=400&h=250&fit=crop',
      2: 'https://images.unsplash.com/photo-1534113414509-0eec2bfb493f?w=400&h=250&fit=crop',
      3: 'https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=400&h=250&fit=crop',
      4: 'https://images.unsplash.com/photo-1537631468332-b93e15cbc7e4?w=400&h=250&fit=crop'
    };

    function ensureUrl(url) {
      if (!url) return '';
      if (url.startsWith('http://') || url.startsWith('https://')) return url;
      return 'https://' + url;
    }

    /* ---- BUILD PROVINCE INDEX ---- */
    function buildProvincesByRegion(listings) {
      const map = {};
      listings.forEach(l => {
        if (!map[l.regionCode]) map[l.regionCode] = new Set();
        map[l.regionCode].add(l.provinciaCode);
      });
      return map;
    }

    /* ---- NAV ---- */
    function Nav({ onNavigate, currentPage }) {
      return e('nav', { className: 'nav' },
        e('div', { className: 'nav-logo', onClick: () => onNavigate('home') }, 'AffittoDiretto.it'),
        e('div', { className: 'nav-links' },
          e('a', { className: 'nav-link' + (currentPage === 'search' ? ' active' : ''), onClick: () => onNavigate('search') }, 'Search'),
          e('a', { className: 'nav-link' + (currentPage === 'rfp' ? ' active' : ''), onClick: () => onNavigate('rfp') }, 'Call for Proposals'),
          e('a', { className: 'nav-link' + (currentPage === 'login' ? ' active' : ''), onClick: () => onNavigate('login') }, 'Login')
        )
      );
    }

    /* ---- HOME ---- */
    function HomePage({ listings, onNavigate, onPropertyClick }) {
      const featuredListings = useMemo(() => listings.filter(l => l.featured).slice(0, 8), [listings]);
      return e('div', null,
        e('div', { className: 'hero' },
          e('h1', { className: 'hero-title' }, 'Book Direct in Italy'),
          e('p', { className: 'hero-subtitle' }, 'Connect directly with property owners. No middleman fees.'),
          e('button', { className: 'btn btn-secondary', onClick: () => onNavigate('search'), style: { fontSize: '16px', padding: '14px 32px' } }, 'Search Properties')
        ),
        e('div', { className: 'stats-bar' },
          e('div', { className: 'stat' }, e('div', { className: 'stat-number' }, '63,304'), e('div', { className: 'stat-label' }, 'Properties')),
          e('div', { className: 'stat' }, e('div', { className: 'stat-number' }, '5'), e('div', { className: 'stat-label' }, 'Regions')),
          e('div', { className: 'stat' }, e('div', { className: 'stat-number' }, '26'), e('div', { className: 'stat-label' }, 'Provinces')),
          e('div', { className: 'stat' }, e('div', { className: 'stat-number' }, '0%'), e('div', { className: 'stat-label' }, 'Booking Fees'))
        ),
        e('div', { style: { padding: '32px 24px' } },
          e('h2', { style: { fontSize: '28px', fontWeight: '700', marginBottom: '24px' } }, 'Featured Properties'),
          e('div', { className: 'property-grid' },
            featuredListings.map(listing =>
              e('div', { key: listing.id, className: 'card property-card', onClick: () => onPropertyClick(listing.id) },
                e('div', { className: 'property-card-image', style: { backgroundImage: 'url(' + REGION_PHOTOS[listing.regionCode] + ')' } },
                  e('div', { className: 'property-card-overlay' },
                    e('div', { className: 'property-card-name' }, listing.name),
                    e('div', { className: 'property-card-type' }, listing.type + ' - ' + listing.comune)
                  )
                ),
                e('div', { className: 'property-card-info' },
                  e('div', { className: 'price' }, '\u20AC' + listing.price + '/night'),
                  listing.stars > 0 && e('div', { className: 'stars' }, '\u2605'.repeat(listing.stars)),
                  e('div', { style: { fontSize: '13px', color: '#666', marginBottom: '8px' } }, listing.beds + ' beds \u2022 ' + listing.rooms + ' rooms'),
                  listing.claimed && e('span', { className: 'badge badge-success' }, 'Verified Owner')
                )
              )
            )
          )
        ),
        e('div', { style: { padding: '32px 24px', background: '#f5f5f5' } },
          e('h2', { style: { fontSize: '28px', fontWeight: '700', marginBottom: '24px' } }, 'Explore Regions'),
          e('div', { className: 'property-grid' },
            Object.entries(window.REGIONS).map(([code, name]) => {
              const count = listings.filter(l => l.regionCode === parseInt(code)).length;
              return e('div', { key: code, className: 'card', onClick: () => onNavigate('search'), style: { cursor: 'pointer' } },
                e('div', { style: { backgroundImage: 'url(' + REGION_PHOTOS[parseInt(code)] + ')', height: '200px', backgroundSize: 'cover', backgroundPosition: 'center' } }),
                e('div', { style: { padding: '16px' } },
                  e('h3', { style: { fontSize: '18px', fontWeight: '600', margin: '0 0 4px 0' } }, name),
                  e('p', { style: { color: '#666', margin: '0', fontSize: '13px' } }, count.toLocaleString() + ' properties')
                )
              );
            })
          )
        ),
        e('div', { style: { padding: '48px 24px', textAlign: 'center', background: 'linear-gradient(135deg, var(--green), var(--blue))', color: 'white' } },
          e('h2', { style: { fontSize: '28px', fontWeight: '700', marginBottom: '16px' } }, 'Are you a property owner?'),
          e('p', { style: { fontSize: '16px', marginBottom: '24px', opacity: '0.95' } }, 'Claim your listing and reach tourists directly. Save on commission fees.'),
          e('button', { className: 'btn btn-secondary', onClick: () => onNavigate('claim') }, 'Claim Your Property')
        )
      );
    }

    /* ---- SMART PAGINATION ---- */
    function Pagination({ page, totalPages, onPageChange }) {
      if (totalPages <= 1) return null;
      const pages = [];
      pages.push(1);
      if (page > 3) pages.push('...');
      for (let i = Math.max(2, page - 1); i <= Math.min(totalPages - 1, page + 1); i++) {
        pages.push(i);
      }
      if (page < totalPages - 2) pages.push('...');
      if (totalPages > 1) pages.push(totalPages);
      return e('div', { className: 'pagination' },
        e('button', { onClick: () => onPageChange(Math.max(1, page - 1)), disabled: page === 1 }, '\u2190'),
        pages.map((p, i) =>
          p === '...' ? e('span', { key: 'e' + i, style: { padding: '8px 4px' } }, '...') :
          e('button', { key: p, className: p === page ? 'active' : '', onClick: () => onPageChange(p) }, p)
        ),
        e('button', { onClick: () => onPageChange(Math.min(totalPages, page + 1)), disabled: page === totalPages }, '\u2192')
      );
    }

    /* ---- MAP VIEW ---- */
    function MapView({ listings, onPropertyClick }) {
      const mapRef = useRef(null);
      const mapInstance = useRef(null);

      useEffect(() => {
        if (!mapRef.current || mapInstance.current) return;
        const withCoords = listings.filter(l => l.lat && l.lon);
        if (withCoords.length === 0) return;

        const map = L.map(mapRef.current).setView([42.5, 12.5], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '\u00A9 OpenStreetMap'
        }).addTo(map);
        mapInstance.current = map;

        const markers = L.layerGroup();
        const sample = withCoords.slice(0, 500);
        sample.forEach(l => {
          const marker = L.marker([l.lat, l.lon])
            .bindPopup('<b>' + l.name + '</b><br>' + l.type + '<br>\u20AC' + l.price + '/night');
          marker.on('click', () => onPropertyClick(l.id));
          markers.addLayer(marker);
        });
        markers.addTo(map);

        return () => {
          map.remove();
          mapInstance.current = null;
        };
      }, [listings]);

      const withCoords = listings.filter(l => l.lat && l.lon).length;
      return e('div', null,
        e('div', { style: { padding: '8px 16px', background: '#fff3e0', borderRadius: '4px', marginBottom: '8px', fontSize: '13px', color: '#e65100' } },
          'Showing up to 500 of ' + withCoords + ' mapped properties (' + listings.length + ' total in results)'
        ),
        e('div', { ref: mapRef, style: { width: '100%', height: '500px', borderRadius: '8px' } })
      );
    }

    /* ---- SEARCH PAGE ---- */
    function SearchPage({ listings, onPropertyClick, provincesByRegion }) {
      const [region, setRegion] = useState(0);
      const [provincia, setProvincia] = useState(-1);
      const [comune, setComune] = useState('');
      const [types, setTypes] = useState([]);
      const [stars, setStars] = useState(-1);
      const [budget, setBudget] = useState(500);
      const [beds, setBeds] = useState(0);
      const [amenities, setAmenities] = useState([]);
      const [sort, setSort] = useState('relevance');
      const [page, setPage] = useState(1);
      const [viewMode, setViewMode] = useState('list');

      const provincesForRegion = useMemo(() => {
        const codes = provincesByRegion[region] || new Set();
        return Array.from(codes).map(c => ({ code: c, name: window.PROVINCES[c] })).sort((a, b) => a.name.localeCompare(b.name));
      }, [region, provincesByRegion]);

      const filteredListings = useMemo(() => {
        return listings.filter(l => {
          if (l.regionCode !== region) return false;
          if (provincia >= 0 && l.provinciaCode !== provincia) return false;
          if (comune && !l.comune.toLowerCase().includes(comune.toLowerCase())) return false;
          if (types.length > 0 && !types.includes(l.typeCode)) return false;
          if (stars >= 0 && l.stars !== stars) return false;
          if (l.price > budget) return false;
          if (l.beds < beds) return false;
          if (amenities.length > 0 && !amenities.every(a => l.amenities[a])) return false;
          return true;
        }).sort((a, b) => {
          if (sort === 'price-asc') return a.price - b.price;
          if (sort === 'price-desc') return b.price - a.price;
          if (sort === 'stars') return b.stars - a.stars;
          if (sort === 'beds') return b.beds - a.beds;
          return (b.claimed ? 1 : 0) - (a.claimed ? 1 : 0);
        });

    /* ---- PROPERTY DETAIL ---- */

      const listing = listings.find(l => l.id === propertyId);

      const mapRef = useRef(null);
      const mapInstance = useRef(null);

      useEffect(() => {
        if (!mapRef.current || !listing.lat || !listing.lon) return;
        if (mapInstance.current) { mapInstance.current.remove(); mapInstance.current = null; }
        const map = L.map(mapRef.current).setView([listing.lat, listing.lon], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '\u00A9 OpenStreetMap' }).addTo(map);
        L.marker([listing.lat, listing.lon]).addTo(map).bindPopup(listing.name).openPopup();
        mapInstance.current = map;
        return () => { if (mapInstance.current) { mapInstance.current.remove(); mapInstance.current = null; } };

      if (submitted) {

        e('div', { className: 'card', style: { padding: '24px' } },
          e('div', { style: { marginBottom: '16px' } },
            e('label', { style: { display: 'block', marginBottom: '6px', fontWeight: '600' } }, 'Email'),
            e('input', { type: 'email', placeholder: 'your@email.com', className: 'input' })
          ),
          e('div', { style: { marginBottom: '24px' } },
            e('label', { style: { display: 'block', marginBottom: '6px', fontWeight: '600' } }, 'Password'),
            e('input', { type: 'password', placeholder: 'password', className: 'input' })
          ),
          e('button', { className: 'btn btn-primary', style: { width: '100%' } }, 'Sign In'),
          e('p', { style: { textAlign: 'center', marginTop: '16px', fontSize: '13px', color: '#666' } }, 'Don\'t have an account? Sign up as a tourist or claim your property as an owner.')
        )
      );
    }

    /* ---- ADMIN PANEL (hidden, /admin) ---- */
    function AdminPanel({ listings, onBack }) {
      const claimed = listings.filter(l => l.claimed).length;
      const withCoords = listings.filter(l => l.lat && l.lon).length;
      const withWebsite = listings.filter(l => l.website).length;
      const regionCounts = {};
      listings.forEach(l => { regionCounts[l.region] = (regionCounts[l.region] || 0) + 1; });

      return e('div', { style: { padding: '24px', maxWidth: '900px', margin: '0 auto' } },
        e('button', { className: 'btn btn-secondary', onClick: onBack, style: { marginBottom: '16px' } }, '\u2190 Back'),
        e('h1', { style: { fontSize: '28px', fontWeight: '700', marginBottom: '24px' } }, 'Admin Panel'),
        e('div', { className: 'stats-bar' },
          e('div', { className: 'stat' }, e('div', { className: 'stat-number' }, listings.length.toLocaleString()), e('div', { className: 'stat-label' }, 'Total Properties')),
          e('div', { className: 'stat' }, e('div', { className: 'stat-number' }, claimed), e('div', { className: 'stat-label' }, 'Claimed')),
          e('div', { className: 'stat' }, e('div', { className: 'stat-number' }, withCoords.toLocaleString()), e('div', { className: 'stat-label' }, 'With Coordinates')),
          e('div', { className: 'stat' }, e('div', { className: 'stat-number' }, withWebsite.toLocaleString()), e('div', { className: 'stat-label' }, 'With Website'))
        ),
        e('h2', { style: { fontSize: '20px', fontWeight: '600', margin: '24px 0 16px' } }, 'Properties by Region'),
        e('div', { className: 'card', style: { padding: '24px' } },
          Object.entries(regionCounts).sort((a, b) => b[1] - a[1]).map(([region, count]) =>
            e('div', { key: region, style: { display: 'flex', justifyContent: 'space-between', padding: '12px 0', borderBottom: '1px solid #f0f0f0' } },
              e('span', { style: { fontWeight: '500' } }, region),
              e('span', { style: { color: 'var(--orange)', fontWeight: '600' } }, count.toLocaleString())
            )
          )
        )
      );
    }

    /* ---- APP ---- */
    function App() {
      const [currentPage, setCurrentPage] = useState('home');
      const [selectedPropertyId, setSelectedPropertyId] = useState(null);
      const [listings, setListings] = useState([]);
      const [provincesByRegion, setProvincesByRegion] = useState({});

      useEffect(() => {
        const parsed = parseListings();
        setListings(parsed);
        setProvincesByRegion(buildProvincesByRegion(parsed));
        if (window.location.hash === '#/admin') setCurrentPage('admin');
      }, []);

      useEffect(() => {
        const onHash = () => {
          if (window.location.hash === '#/admin') setCurrentPage('admin');
        };
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const handleNavigate = (page) => { setCurrentPage(page); setSelectedPropertyId(null); window.scrollTo(0, 0); };
      const handlePropertyClick = (id) => { setSelectedPropertyId(id); setCurrentPage('detail'); window.scrollTo(0, 0); };

      if (!listings.length) {
        return e('div', { style: { padding: '48px', textAlign: 'center' } },
          e('div', { className: 'spinner' }),
          e('p', { style: { marginTop: '16px', color: '#666' } }, 'Loading 63,304 properties...')
        );
      }

      if (currentPage === 'admin') {
        return e(AdminPanel, { listings, onBack: () => handleNavigate('home') });
      }

      return e('div', null,
        e(Nav, { onNavigate: handleNavigate, currentPage }),
        currentPage === 'home' && e(HomePage, { listings, onNavigate: handleNavigate, onPropertyClick: handlePropertyClick }),
        currentPage === 'search' && e(SearchPage, { listings, onPropertyClick: handlePropertyClick, provincesByRegion }),
        currentPage === 'detail' && selectedPropertyId && e(PropertyDetail, { propertyId: selectedPropertyId, listings, onBack: () => handleNavigate('search') }),
        currentPage === 'rfp' && e(RFPPage, { onBack: () => handleNavigate('home') }),
        currentPage === 'claim' && e(ClaimPage, { listings, onBack: () => handleNavigate('home') }),
        currentPage === 'login' && e(LoginPage, { onBack: () => handleNavigate('home') }),
        e('footer', { style: { background: '#333', color: '#ccc', padding: '32px 24px', textAlign: 'center', marginTop: '48px' } },
          e('div', { style: { fontWeight: '600', color: 'white', marginBottom: '8px' } }, 'AffittoDiretto.it'),
          e('p', { style: { fontSize: '13px', margin: 0 } }, 'Book direct. Save on fees. Support local owners.')
        )
      );
    }

    ReactDOM.render(e(App), document.getElementById('root'));
  </script>
</body>
</html>
