    var ENRICHMENT_MAP = {};

    async function loadEnrichmentData() {
      try {
        var resp = await fetch('enrichment_map.json');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return await resp.json();
      } catch(err) {
        console.warn('Enrichment load failed:', err);
        return {};
      }
    }

    async function loadBlogPostsFromSupabase() {
      try {
        var resp = await fetch(
          SUPABASE_URL + '/rest/v1/blog_posts?select=*&order=date.desc',
          { headers: { 'apikey': SUPABASE_KEY } }
        );
        if (!resp.ok) return [];
        return await resp.json();
      } catch(err) {
        console.warn('Blog posts load failed:', err);
        return [];
      }
    }

    function smartPagination(current, total) {

      if (start > 2) pages.push('...');
      for (var i = start; i <= end; i++) {

    function MessagesTab(props) {
      var user = props.user;
      var stateConversations = useState([]);
      var conversations = stateConversations[0];
      var setConversations = stateConversations[1];
      var stateSelectedConv = useState(null);
      var selectedConv = stateSelectedConv[0];
      var setSelectedConv = stateSelectedConv[1];
      var stateMessages = useState([]);
      var messages = stateMessages[0];
      var setMessages = stateMessages[1];
      var stateNewMessage = useState('');
      var newMessage = stateNewMessage[0];
      var setNewMessage = stateNewMessage[1];

      var loadConversations = function() {
        var saved = localStorage.getItem('ad_conversations');
        var convs = saved ? JSON.parse(saved) : [];
        var filtered = convs.filter(function(c) {
          if (user && user.role === 'guest') {
            return c.guestId === user.id;
          } else if (user && user.role === 'host') {
            var claimedProps = user.claimedProperties || [];
            return c.hostId === user.id || (claimedProps.indexOf(c.propertyId) !== -1);
          }
          return false;
        });
        filtered.sort(function(a, b) {
          return new Date(b.lastMessageAt) - new Date(a.lastMessageAt);
        });
        return filtered;
      };

      useEffect(function() {
        var filtered = loadConversations();
        setConversations(filtered);
        if (filtered.length > 0) {
          setSelectedConv(filtered[0].id);
          var msgs = localStorage.getItem('ad_messages_' + filtered[0].id);
          setMessages(msgs ? JSON.parse(msgs) : []);
        }
      }, [user]);

      var handleSelectConversation = function(convId) {
        setSelectedConv(convId);
        var msgs = localStorage.getItem('ad_messages_' + convId);
        setMessages(msgs ? JSON.parse(msgs) : []);
        var allConvs = JSON.parse(localStorage.getItem('ad_conversations') || '[]');
        allConvs = allConvs.map(function(c) {
          if (c.id === convId) {
            if (user && user.role === 'guest') c.unreadGuest = 0;
            else if (user && user.role === 'host') c.unreadHost = 0;
          }
          return c;
        });
        localStorage.setItem('ad_conversations', JSON.stringify(allConvs));
        setConversations(loadConversations());
      };

      var handleSendMessage = function() {
        if (!newMessage.trim() || !selectedConv) return;
        var updatedMessages = messages.slice();
        updatedMessages.push({
          id: 'msg_' + Date.now(),
          senderId: user.id,
          senderName: user.name,
          text: newMessage,
          timestamp: new Date().toISOString(),
          type: 'message'
        });
        setMessages(updatedMessages);
        localStorage.setItem('ad_messages_' + selectedConv, JSON.stringify(updatedMessages));

        var allConvs = JSON.parse(localStorage.getItem('ad_conversations') || '[]');
        allConvs = allConvs.map(function(c) {
          if (c.id === selectedConv) {
            c.lastMessage = newMessage;
            c.lastMessageAt = new Date().toISOString();
            if (user && user.role === 'guest') c.unreadHost = (c.unreadHost || 0) + 1;
            else if (user && user.role === 'host') c.unreadGuest = (c.unreadGuest || 0) + 1;
          }
          return c;
        });
        localStorage.setItem('ad_conversations', JSON.stringify(allConvs));
        setConversations(loadConversations());
        setNewMessage('');
      };

      var handleAgreeToStay = function() {
        if (!selectedConv || !user) return;
        var allConvs = JSON.parse(localStorage.getItem('ad_conversations') || '[]');
        var agreedConv = allConvs.find(function(c) { return c.id === selectedConv; });
        if (!agreedConv) return;
        var now = new Date().toISOString();

        allConvs = allConvs.map(function(c) {
          if (c.id === selectedConv) {
            c.status = 'agreed';
            c.lastMessage = 'I have agreed to stay at this property.';
            c.lastMessageAt = now;
            c.unreadHost = (c.unreadHost || 0) + 1;
            return c;
          }
          if (c.guestId === user.id && c.id !== selectedConv && c.status !== 'agreed' && c.status !== 'withdrawn') {
            c.status = 'withdrawn';
            c.lastMessage = 'Guest has chosen another property and withdrawn this inquiry.';
            c.lastMessageAt = now;
            c.unreadHost = (c.unreadHost || 0) + 1;
            var otherMsgs = JSON.parse(localStorage.getItem('ad_messages_' + c.id) || '[]');
            otherMsgs.push({
              id: 'msg_' + Date.now() + '_' + c.id,
              senderId: 'system',
              senderName: 'System',
              text: 'This inquiry has been withdrawn. ' + user.name + ' has agreed to stay at ' + agreedConv.propertyName + '.',
              timestamp: now,
              type: 'system'
            });
            localStorage.setItem('ad_messages_' + c.id, JSON.stringify(otherMsgs));
            return c;
          }
          return c;
        });
        localStorage.setItem('ad_conversations', JSON.stringify(allConvs));

        var agreedMsgs = messages.slice();
        agreedMsgs.push({
          id: 'msg_' + Date.now(),
          senderId: 'system',
          senderName: 'System',
          text: user.name + ' has agreed to stay at this property. Booking confirmed!',
          timestamp: now,
          type: 'system'
        });
        setMessages(agreedMsgs);
        localStorage.setItem('ad_messages_' + selectedConv, JSON.stringify(agreedMsgs));
        setConversations(loadConversations());
      };

      var activeConv = conversations.find(function(c) { return c.id === selectedConv; });
      var statusLabel = function(s) {
        if (s === 'agreed') return { text: 'Confirmed', color: '#2e7d32', bg: '#e8f5e9' };
        if (s === 'withdrawn') return { text: 'Withdrawn', color: '#e65100', bg: '#fff3e0' };
        if (s === 'declined') return { text: 'Declined', color: '#c62828', bg: '#fce4ec' };
        return { text: 'Open', color: '#1565c0', bg: '#e3f2fd' };
      };

      return e('div', null,
        e('div', { className: 'chat-container' },
          e('div', { className: 'chat-sidebar' },
            conversations.length === 0 ?
              e('div', { style: { padding: '1rem' } }, 'No conversations yet') :
              conversations.map(function(conv) {
                var isActive = selectedConv === conv.id;
                var unreadCount = user && user.role === 'guest' ? conv.unreadGuest : conv.unreadHost;
                var sl = statusLabel(conv.status);
                return e('div', {
                  key: conv.id,
                  className: 'conversation-item' + (isActive ? ' active' : '') + (unreadCount > 0 ? ' unread' : ''),
                  onClick: function() { handleSelectConversation(conv.id); }
                },
                  e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
                    e('div', { className: 'conversation-property' }, conv.propertyName),
                    e('span', { style: { fontSize: '0.7rem', padding: '2px 6px', borderRadius: '4px', background: sl.bg, color: sl.color, fontWeight: 600 } }, sl.text)
                  ),
                  conv.checkIn ? e('div', { style: { fontSize: '0.75rem', color: 'var(--text-light)', marginTop: '2px' } }, conv.checkIn + ' to ' + conv.checkOut + ' | ' + conv.guests + ' guests') : null,
                  e('div', { className: 'conversation-preview' }, conv.lastMessage || 'No messages'),
                  e('div', { className: 'conversation-meta' },
                    e('span', null, new Date(conv.lastMessageAt).toLocaleDateString()),
                    unreadCount > 0 ? e('div', { className: 'conversation-badge' }, unreadCount) : null
                  )
                );
              })
          ),
          e('div', { className: 'chat-main' },
            selectedConv && activeConv ? e('div', null,
              e('div', { className: 'chat-header' },
                e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
                  e('div', null,
                    e('h3', { style: { margin: 0 } }, activeConv.propertyName || 'Conversation'),
                    e('p', { style: { margin: '2px 0 0', fontSize: '0.85rem', color: 'var(--text-light)' } }, 'with ' + (user && user.role === 'guest' ? (activeConv.hostName || 'host') : activeConv.guestName))
                  ),
                  (function() {
                    var sl = statusLabel(activeConv.status);
                    return e('span', { style: { padding: '4px 10px', borderRadius: '6px', background: sl.bg, color: sl.color, fontWeight: 600, fontSize: '0.85rem' } }, sl.text);
                  })()
                ),
                activeConv.checkIn ? e('div', { style: { marginTop: '0.4rem', padding: '0.4rem 0.6rem', background: '#f5f5f5', borderRadius: '6px', fontSize: '0.85rem' } },
                  'Dates: ' + activeConv.checkIn + ' to ' + activeConv.checkOut + ' | Guests: ' + (activeConv.guests || '-') + ' | Rooms: ' + (activeConv.rooms || '-')
                ) : null
              ),
              e('div', { className: 'chat-messages' },
                messages.length === 0 ?
                  e('div', { className: 'chat-empty' }, e('p', null, 'No messages yet')) :
                  messages.map(function(msg) {
                    var isSent = msg.senderId === user.id;
                    var isSystem = msg.type === 'system';
                    return e('div', { key: msg.id },
                      msg.type === 'inquiry' ? e('div', { style: { textAlign: 'center', padding: '0.5rem', fontSize: '0.85rem', color: 'var(--text-light)', marginBottom: '0.5rem' } }, '📬 Inquiry received') : null,
                      isSystem ? e('div', { style: { textAlign: 'center', padding: '0.75rem 1rem', margin: '0.5rem auto', maxWidth: '80%', fontSize: '0.85rem', color: '#555', background: '#f0f4f8', borderRadius: '8px', fontStyle: 'italic' } }, msg.text) :
                      e('div', null,
                        e('div', { className: 'message-bubble ' + (isSent ? 'sent' : 'received') }, msg.text),
                        e('div', { className: 'message-meta' }, new Date(msg.timestamp).toLocaleTimeString())
                      )
                    );
                  })
              ),
              activeConv.status !== 'agreed' && activeConv.status !== 'withdrawn' && activeConv.status !== 'declined' ? e('div', null,
                e('div', { className: 'chat-input-area' },
                  e('input', { type: 'text', placeholder: 'Type a message...', value: newMessage, onChange: function(evt) { setNewMessage(evt.target.value); }, onKeyPress: function(evt) { if (evt.key === 'Enter') handleSendMessage(); } }),
                  e('button', { onClick: handleSendMessage }, 'Send')
                ),
                user && user.role === 'guest' ? e('button', {
                  onClick: handleAgreeToStay,
                  style: { display: 'block', width: '100%', marginTop: '0.5rem', padding: '0.75rem', background: '#2e7d32', color: 'white', border: 'none', borderRadius: '8px', fontSize: '0.95rem', fontWeight: 600, cursor: 'pointer' }
                }, 'Agree to Stay at This Property') : null
              ) : e('div', { style: { padding: '1rem', textAlign: 'center', background: '#f5f5f5', borderRadius: '8px', margin: '0.5rem', color: '#666' } },
                activeConv.status === 'agreed' ? 'Booking confirmed. You can still message the host.' : 'This inquiry has been withdrawn.'

    }

      // Google Sign-In handler

        var users = JSON.parse(localStorage.getItem('ad_users') || '[]');
        var found = users.find(function(u) { return u.email === decoded.email && u.role === role; });
        if (found) {
          found.emailConfirmed = true;
          found.googleId = decoded.sub;
          found.avatar = decoded.picture;
          users = users.map(function(u) { return u.id === found.id ? found : u; });
          localStorage.setItem('ad_users', JSON.stringify(users));
          localStorage.setItem('ad_user', JSON.stringify(found));
          onLogin(found);
        } else {
          // Auto-create account from Google
          var newUser = {
            id: 'user_' + Date.now(),
            email: decoded.email,
            password: '',
            name: decoded.name || decoded.email.split('@')[0],
            role: role,
            googleId: decoded.sub,
            avatar: decoded.picture,
            phone: '',
            whatsapp: '',
            bio: '',
            shareEmail: false,
            sharePhone: false,
            shareWhatsapp: false,
            claimedProperties: [],
            createdProperties: [],
            emailConfirmed: true,
            confirmationCode: ''
          };
          users.push(newUser);
          localStorage.setItem('ad_users', JSON.stringify(users));
          localStorage.setItem('ad_user', JSON.stringify(newUser));
          onLogin(newUser);
        }
      };

      // Initialize Google Sign-In button
      useEffect(function() {
        window._googleLoginCallback = handleGoogleLogin;
        var clientId = GOOGLE_CLIENT_ID;
        if (!clientId || !window.google || !window.google.accounts) return;
        try {
          window.google.accounts.id.initialize({
            client_id: clientId,
            callback: window.handleGoogleCredentialResponse
          });
          if (googleBtnRef.current) {
            googleBtnRef.current.innerHTML = '';
            window.google.accounts.id.renderButton(googleBtnRef.current, {
              theme: 'outline',

        return function() { window._googleLoginCallback = null; };
      }, [role, mode]);

      var handleLogin = function() {
        if (!email || !password) {

        var users = JSON.parse(localStorage.getItem('ad_users') || '[]');
        var found = users.find(function(u) { return u.email === email && u.password === password && u.role === role; });
        if (found) {
          if (!found.emailConfirmed) {

            setPendingCode(code);
            setMode('confirm');

        if (found) {

          users = users.map(function(u) { return u.id === found.id ? found : u; });
          localStorage.setItem('ad_users', JSON.stringify(users));
          localStorage.setItem('ad_user', JSON.stringify(found));
          onLogin(found);
        }
      };

      var handleSignup = function() {

          email: email,
          password: password,
          name: name,
          role: role,
          phone: '',
          whatsapp: '',
          bio: '',
          shareEmail: false,
          sharePhone: false,
          shareWhatsapp: false,
          claimedProperties: [],
          createdProperties: [],
          emailConfirmed: false,
          confirmationCode: code
        };
        users.push(user);

              e('path', { fill: '#4285F4', d: 'M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z' }),
              e('path', { fill: '#FBBC05', d: 'M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z' }),
              e('path', { fill: '#34A853', d: 'M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z' })
            ),
            mode === 'signup' ? 'Sign up with Google' : 'Sign in with Google'
          ),
        e('div', { style: { textAlign: 'center', margin: '1rem 0', color: '#999', fontSize: '0.85rem', display: 'flex', alignItems: 'center', gap: '0.75rem' } },
          e('div', { style: { flex: 1, height: '1px', background: '#ddd' } }),

      return e('div', { className: 'login-container' },
        e('div', { className: 'login-form' },

    // ============================================================
    // RFQ PAGE — Guest multi-step quote request form
    // ============================================================
    function RFQPage(props) {
      var onNavigate = props.onNavigate;
      var user = props.user;
      var listings = props.listings || [];
      // Build unique sorted city list from actual property data
      var allCities = useMemo(function() {
        var seen = new Set();
        var cities = [];
        listings.forEach(function(l) {
          var c = l.comune;
          if (c && c.trim() && !seen.has(c)) { seen.add(c); cities.push(c); }
        });
        return cities.sort(function(a,b){return a.localeCompare(b,'it');});
      }, [listings]);

      // SIGN-IN GATE — must be logged in to submit a quote request
      if (!user) {
        return e('div', { style: { maxWidth:'500px', margin:'4rem auto', padding:'2rem', textAlign:'center' } },
          e('div', { style:{ fontSize:'3rem', marginBottom:'1rem' } }, '🔒'),
          e('h2', { style:{ color:'var(--primary-blue)', marginBottom:'0.5rem' } }, 'Sign in to Request a Quote'),
          e('p', { style:{ color:'#666', marginBottom:'1.5rem', lineHeight:'1.6' } }, 'Create a free account or sign in so we can pre-fill your details and track all your quote requests in one place.'),
          e('button', { className:'cta-button', onClick:function(){ onNavigate('login'); } }, 'Sign In / Create Account'),
          e('p', null, e('a', { href:'#/home', style:{ color:'#999', fontSize:'0.85rem', marginTop:'1rem', display:'inline-block' } }, '← Back to homepage'))
        );
      }

      var stateStep = useState(1); var step = stateStep[0]; var setStep = stateStep[1];
      var stateForm = useState({
        city: '', neighborhood: '', property_types: [],
        check_in: '', check_out: '', flexibility_days: 0,
        adults: 2, children: 0, infants: 0, pets: false,
        budget_min: 50, budget_max: 200, amenities: [], min_stars: 0,
        special_requests: '',
        guest_name: user.name || user.given_name || '',
        guest_email: user.email || '',
        guest_phone: user.phone || '',
        privacy: true
      });
      var form = stateForm[0]; var setForm = stateForm[1];
      var stateSubmitting = useState(false); var submitting = stateSubmitting[0]; var setSubmitting = stateSubmitting[1];
      var stateError = useState(''); var formError = stateError[0]; var setFormError = stateError[1];
      var stateSuccess = useState(null); var successToken = stateSuccess[0]; var setSuccessToken = stateSuccess[1];

      var updateForm = function(key, val) { setForm(function(f) { var n = Object.assign({}, f); n[key] = val; return n; }); };
      var toggleArr = function(key, val) {
        setForm(function(f) {
          var arr = f[key].slice();
          var idx = arr.indexOf(val);
          if (idx >= 0) arr.splice(idx, 1); else arr.push(val);
          var n = Object.assign({}, f); n[key] = arr; return n;
        });
      };

      var AMENITY_OPTS = [
        {key:'wifi',label:'WiFi'},{key:'pool',label:'Pool'},{key:'parking',label:'Parking'},
        {key:'kitchen',label:'Kitchen'},{key:'ac',label:'Air Con'},{key:'sea_view',label:'Sea View'},
        {key:'garden',label:'Garden'},{key:'pets',label:'Pets OK'}
      ];
      var PROP_TYPES = [{key:'hotel',label:'Hotel'},{key:'bnb',label:'B&B'},{key:'rental',label:'Vacation Rental'},{key:'agriturismo',label:'Agriturismo'}];

      var nights = (form.check_in && form.check_out) ? Math.max(0, Math.round((new Date(form.check_out) - new Date(form.check_in)) / 86400000)) : 0;

      var validateStep = function(s) {
        setFormError('');
        if (s === 1 && !form.city) { setFormError('Please select a city.'); return false; }
        if (s === 2) {
          if (!form.check_in || !form.check_out) { setFormError('Please select check-in and check-out dates.'); return false; }
          if (nights < 1) { setFormError('Check-out must be after check-in.'); return false; }
        }
        if (s === 3 && form.adults < 1) { setFormError('At least 1 adult required.'); return false; }
        return true;
      };

      var handleNext = function() {
        if (!validateStep(step)) return;
        if (step < 4) setStep(step + 1);
        else handleSubmit();
      };

      var handleSubmit = function() {
        setSubmitting(true); setFormError('');
        var payload = Object.assign({}, form);
        fetch(SUPABASE_URL + '/rest/v1/rfq_requests', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Prefer': 'return=representation' },
          body: JSON.stringify({
            guest_name: payload.guest_name || (user.name || user.given_name || 'Guest'),
            guest_email: payload.guest_email || user.email,
            guest_phone: payload.guest_phone || null,
            city: payload.city, neighborhood: payload.neighborhood || null,
            check_in: payload.check_in, check_out: payload.check_out, flexibility_days: payload.flexibility_days,
            adults: payload.adults, children: payload.children, infants: payload.infants, pets: payload.pets,
            property_types: payload.property_types.length ? payload.property_types : null,
            budget_min: payload.budget_min, budget_max: payload.budget_max,
            amenities: payload.amenities.length ? payload.amenities : null,
            min_stars: payload.min_stars, special_requests: payload.special_requests || null
          })
        }).then(function(r) {
          if (!r.ok) { return r.text().then(function(t){ throw new Error(t); }); }
          return r.json();
        }).then(function(data) {
          var row = Array.isArray(data) ? data[0] : data;
          var token = row && row.guest_token;
          if (token) {
            setSuccessToken(token);
            // Fire-and-forget: trigger matching + admin notification edge function
            fetch(SUPABASE_URL + '/functions/v1/rfq-match', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
              body: JSON.stringify({ rfq_id: row.id, batch: 1 })
            }).catch(function() {});
          } else {
            setFormError('Submission failed: no confirmation token. Make sure the rfq_requests table is set up in Supabase (run rfq_schema.sql).');
          }
        }).catch(function(err) {
          console.error('RFQ submit error:', err);
          setFormError('Error: ' + (err.message || 'Network error. Please try again.'));
        }).finally(function() { setSubmitting(false); });
      };

      var TOTAL_STEPS = 4;
      var stepTitles = ['Location','Dates','Party Size','Budget & Preferences'];
      var inputStyle = { width:'100%', padding:'0.6rem 0.8rem', border:'1px solid #ddd', borderRadius:'7px', fontSize:'0.95rem', boxSizing:'border-box' };
      var labelStyle = { display:'block', fontWeight:600, fontSize:'0.85rem', color:'#444', marginBottom:'0.35rem' };
      var stepperStyle = { display:'flex', alignItems:'center', gap:'0.8rem' };
      var stepperBtnStyle = { width:'36px', height:'36px', borderRadius:'50%', border:'1px solid #ddd', background:'#f9f9f9', fontSize:'1.2rem', cursor:'pointer', fontWeight:700 };
      var stepperValStyle = { fontWeight:700, fontSize:'1.1rem', minWidth:'28px', textAlign:'center' };
      // Neighborhoods for selected city (from CITY_NEIGHBORHOODS map, or empty array for free text)
      var cityNeighborhoods = CITY_NEIGHBORHOODS[form.city] || [];

      if (successToken) {
        return e('div', { style: { maxWidth:'520px', margin:'4rem auto', padding:'2rem', textAlign:'center' } },
          e('div', { style: { fontSize:'3rem', marginBottom:'1rem' } }, '✅'),
          e('h2', { style: { color:'var(--primary-blue)', marginBottom:'0.5rem' } }, 'Quote Request Sent!'),
          e('p', { style: { color:'#666', marginBottom:'1.5rem' } }, 'We\'ve matched your request with hosts in ' + form.city + '. You\'ll get an email confirmation shortly.'),
          e('button', {
            className: 'cta-button',
            onClick: function() { window.location.hash = '#/quote-request/' + successToken; }
          }, '📊 Track My Quotes'),
          e('br', null),
          e('a', { href:'#/home', style:{color:'#999', fontSize:'0.85rem', marginTop:'1rem', display:'inline-block'} }, 'Back to homepage')
        );
      }

      return e('div', { style: { maxWidth:'620px', margin:'2rem auto', padding:'1.5rem' } },
        // Header
        e('div', { style: { marginBottom:'1.5rem' } },
          e('h2', { style: { color:'var(--primary-blue)', fontSize:'1.6rem', marginBottom:'0.4rem' } }, '🏠 Request a Quote'),
          e('p', { style: { color:'#666', fontSize:'0.95rem' } }, 'Tell us what you\'re looking for and we\'ll contact the best-matched hosts on your behalf.')
        ),
        // Signed-in user banner
        e('div', { style:{ background:'#f0fdf4', border:'1px solid #bbf7d0', borderRadius:'8px', padding:'0.5rem 1rem', marginBottom:'1rem', fontSize:'0.85rem', color:'#166534', display:'flex', alignItems:'center', gap:'0.5rem' } },
          e('span', null, '✅ Signed in as '), e('strong', null, user.email || user.name)
        ),
        // Progress bar
        e('div', { style: { display:'flex', gap:'4px', marginBottom:'1.5rem' } },
          [1,2,3,4].map(function(i) {
            return e('div', { key:i, style:{flex:1, height:'5px', borderRadius:'3px', background: i < step ? 'var(--primary-blue)' : i === step ? 'var(--primary-blue-light)' : '#e5e7eb'} });
          })
        ),
        e('div', { style: { color:'#999', fontSize:'0.8rem', marginBottom:'1.5rem' } }, 'Step ' + step + ' of ' + TOTAL_STEPS + ' — ' + stepTitles[step-1]),

        // Step content
        e('div', { style: { background:'white', border:'1px solid #e5e7eb', borderRadius:'12px', padding:'1.5rem' } },

          // STEP 1: Location
          step === 1 && e('div', null,
            e('h3', { style: { marginBottom:'1.2rem', color:'#222' } }, '📍 Where are you looking?'),
            e('div', { style: { marginBottom:'1rem' } },
              e('label', { style: labelStyle }, 'City *'),
              e('select', {
                style: inputStyle, value: form.city,
                onChange: function(ev) { updateForm('city', ev.target.value); updateForm('neighborhood', ''); }
              },
                e('option', { value:'' }, allCities.length ? '-- Select a city (' + allCities.length + ' available) --' : '-- Loading cities... --'),
                allCities.map(function(c) { return e('option', { key:c, value:c }, c); })
              )
            ),
            form.city && e('div', { style: { marginBottom:'1rem' } },
              e('label', { style: labelStyle }, 'Neighborhood or Metro Station'),
              cityNeighborhoods.length > 0
                ? e('select', {
                    style: inputStyle, value: form.neighborhood,
                    onChange: function(ev) { updateForm('neighborhood', ev.target.value); }
                  },
                    e('option', { value:'' }, '-- Any area (or select specific) --'),
                    cityNeighborhoods.map(function(n) { return e('option', { key:n, value:n }, n); }),
                    e('option', { value:'__custom__' }, '✏️ Type a different area...')
                  )
                : e('input', { type:'text', style:inputStyle, placeholder:'e.g. Trastevere, Pigneto, Colosseum area', value:form.neighborhood, onChange:function(ev){updateForm('neighborhood',ev.target.value);} })
            ),
            form.neighborhood === '__custom__' && e('div', { style:{marginBottom:'1rem',marginTop:'-0.5rem'} },
              e('input', { type:'text', style:inputStyle, placeholder:'Type your neighborhood or area...', autoFocus:true, onChange:function(ev){updateForm('neighborhood',ev.target.value==='__custom__'?'':ev.target.value);} })
            ),
            e('div', null,
              e('label', { style: labelStyle }, 'Property Type (select all that apply)'),
              e('div', { style: { display:'flex', gap:'8px', flexWrap:'wrap', marginTop:'4px' } },
                PROP_TYPES.map(function(pt) {
                  var selected = form.property_types.indexOf(pt.key) >= 0;
                  return e('button', {
                    key:pt.key, type:'button',
                    style:{padding:'6px 14px', borderRadius:'20px', border:'1px solid '+(selected?'var(--primary-blue)':'#ddd'), background:selected?'var(--primary-blue)':'#f9f9f9', color:selected?'white':'#444', cursor:'pointer', fontSize:'0.85rem', fontWeight:selected?700:400},
                    onClick:function(){toggleArr('property_types',pt.key);}
                  }, pt.label);
                }),
                e('button', {
                  type:'button',
                  style:{padding:'6px 14px', borderRadius:'20px', border:'1px solid '+(form.property_types.length===0?'var(--primary-blue)':'#ddd'), background:form.property_types.length===0?'var(--primary-blue)':'#f9f9f9', color:form.property_types.length===0?'white':'#444', cursor:'pointer', fontSize:'0.85rem'},
                  onClick:function(){setForm(function(f){var n=Object.assign({},f);n.property_types=[];return n;});}
                }, 'Any')
              )
            )
          ),

          // STEP 2: Dates
          step === 2 && e('div', null,
            e('h3', { style: { marginBottom:'1.2rem', color:'#222' } }, '📅 When are you traveling?'),
            e('div', { style: { display:'grid', gridTemplateColumns:'1fr 1fr', gap:'1rem', marginBottom:'1rem' } },
              e('div', null,
                e('label', { style: labelStyle }, 'Check-in *'),
                e('input', { type:'date', style:inputStyle, value:form.check_in, min:new Date().toISOString().split('T')[0], onChange:function(ev){updateForm('check_in',ev.target.value);} })
              ),
              e('div', null,
                e('label', { style: labelStyle }, 'Check-out *'),
                e('input', { type:'date', style:inputStyle, value:form.check_out, min:form.check_in||new Date().toISOString().split('T')[0], onChange:function(ev){updateForm('check_out',ev.target.value);} })
              )
            ),
            nights > 0 && e('div', { style: { background:'var(--bg-light)', borderRadius:'8px', padding:'0.6rem 1rem', marginBottom:'1rem', fontWeight:600, color:'var(--primary-blue)' } }, '🌙 ' + nights + ' night' + (nights>1?'s':'') + ' selected'),
            e('div', null,
              e('label', { style: labelStyle }, 'Date Flexibility'),
              e('div', { style: { display:'flex', gap:'8px', flexWrap:'wrap' } },
                [{v:0,l:'Exact dates'},{v:2,l:'±2 days'},{v:7,l:'±1 week'}].map(function(opt) {

      if (loading) return e('div', { style:{textAlign:'center',padding:'4rem',color:'#888'} }, '⏳ Loading request details...');
      if (!outreach || !rfq) return e('div', { style:{textAlign:'center',padding:'4rem'} }, e('p', null, 'Request not found or link expired.'));

      var nights = Math.round((new Date(rfq.check_out)-new Date(rfq.check_in))/86400000);
      var pn = parseFloat(quoteForm.price_per_night) || 0;
      var autoTotal = pn * nights + (parseFloat(quoteForm.cleaning_fee)||0);
      var expired = new Date(outreach.expires_at) < new Date();
      var alreadyResponded = outreach.response_type && outreach.response_type !== null;

      if (submitted) return e('div', { style:{maxWidth:'500px',margin:'4rem auto',padding:'2rem',textAlign:'center'} },
        e('div', { style:{fontSize:'3rem',marginBottom:'1rem'} }, '✅'),
        e('h2', { style:{color:'var(--success)'} }, 'Quote Sent!'),
        e('p', { style:{color:'#666',margin:'0.5rem 0 1.5rem'} }, 'Your quote of €' + quoteForm.price_per_night + '/night has been sent to the guest. You\'ll be notified if they accept.'),
        e('p', { style:{color:'#888',fontSize:'0.85rem'} }, 'Connect your Google Calendar for automatic availability checks in the future. '),
        e('a', { href:'#/dashboard', style:{color:'var(--primary-blue)'} }, 'Open your dashboard →')
      );

      if (declined) return e('div', { style:{maxWidth:'500px',margin:'4rem auto',padding:'2rem',textAlign:'center'} },
        e('div', { style:{fontSize:'3rem',marginBottom:'1rem'} }, '👍'),
        e('h2', null, 'Response Recorded'),
        e('p', { style:{color:'#666'} }, 'Thanks for letting us know. We\'ve notified the system and will contact the next matched host.'),
        e('a', { href:'#/dashboard', style:{color:'var(--primary-blue)',marginTop:'1rem',display:'inline-block'} }, 'Go to dashboard →')
      );

      if (expired && !alreadyResponded) return e('div', { style:{maxWidth:'500px',margin:'4rem auto',padding:'2rem',textAlign:'center'} },
        e('div', { style:{fontSize:'3rem',marginBottom:'1rem'} }, '⏰'),
        e('h2', null, 'Response Window Expired'),
        e('p', { style:{color:'#666'} }, 'This request\'s 24-hour window has passed. The guest has been contacted by other hosts.'),
        e('a', { href:'#/dashboard', style:{color:'var(--primary-blue)',marginTop:'1rem',display:'inline-block'} }, 'Dashboard →')
      );

      return e('div', { style:{maxWidth:'600px',margin:'2rem auto',padding:'1.5rem'} },
        e('h2', { style:{color:'var(--primary-blue)',marginBottom:'0.5rem'} }, '🏡 Quote Request'),
        e('p', { style:{color:'#888',fontSize:'0.85rem',marginBottom:'1.5rem'} }, 'A guest is looking for accommodation in your area. You have been selected as a top match.'),

        // Request details
        e('div', { style:{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:'10px',padding:'1.2rem',marginBottom:'1.5rem'} },
          e('h3', { style:{color:'var(--primary-blue)',marginBottom:'0.8rem',fontSize:'1rem'} }, '📩 Guest Request Details'),
          e('div', { style:{display:'grid',gridTemplateColumns:'auto 1fr',gap:'0.4rem 1rem',fontSize:'0.88rem'} },
            e('span', { style:{fontWeight:600} }, '📍'), e('span', null, rfq.city + (rfq.neighborhood ? ' — ' + rfq.neighborhood : '')),
            e('span', { style:{fontWeight:600} }, '📅'), e('span', null, rfq.check_in + ' → ' + rfq.check_out + ' (' + nights + ' nights)'),
            e('span', { style:{fontWeight:600} }, '👥'), e('span', null, rfq.adults + ' adult' + (rfq.adults>1?'s':'') + (rfq.children?' + '+rfq.children+' children':'') + (rfq.pets?' + pets':'')),
            e('span', { style:{fontWeight:600} }, '💶'), e('span', null, '€' + (rfq.budget_min||'?') + ' – €' + (rfq.budget_max||'?') + ' / night'),
            rfq.amenities && rfq.amenities.length > 0 && e('span', { style:{fontWeight:600} }, '✅'),
            rfq.amenities && rfq.amenities.length > 0 && e('span', null, rfq.amenities.join(', ')),
            rfq.special_requests && e('span', { style:{fontWeight:600} }, '💬'),
            rfq.special_requests && e('span', { style:{fontStyle:'italic'} }, '"' + rfq.special_requests + '"')
          )
        ),

        // Calendar status placeholder
        e('div', { style:{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'8px',padding:'0.8rem 1rem',marginBottom:'1.5rem',display:'flex',alignItems:'center',gap:'0.6rem',fontSize:'0.88rem'} },
          e('span', null, '📅'),
          e('span', null, 'Availability: ', e('strong', null, 'Please confirm dates are free in your calendar'))
        ),

        // Timer warning
        e('div', { style:{background:'#fff7ed',border:'1px solid #fed7aa',borderRadius:'8px',padding:'0.7rem 1rem',marginBottom:'1.5rem',fontSize:'0.85rem',color:'#9a3412',display:'flex',alignItems:'center',gap:'0.5rem'} },
          e('span', null, '⏰'),
          e('span', null, 'Response window: 24 hours from notification. Expires: ' + new Date(outreach.expires_at).toLocaleString())
        ),

        // Quote form
        e('div', { style:{background:'white',border:'1px solid #e5e7eb',borderRadius:'10px',padding:'1.5rem',marginBottom:'1rem'} },
          e('h3', { style:{marginBottom:'1.2rem',color:'#222'} }, '💶 Your Quote'),
          e('div', { style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'1rem'} },
            e('div', null,
              e('label', { style:labelStyle }, 'Price per night (€) *'),
              e('input', { type:'number', style:inputStyle, placeholder:'e.g. 95', min:1, value:quoteForm.price_per_night, onChange:function(ev){updateQ('price_per_night',ev.target.value);} })
            ),
            e('div', null,
              e('label', { style:labelStyle }, 'Cleaning fee (€, optional)'),
              e('input', { type:'number', style:inputStyle, placeholder:'0', min:0, value:quoteForm.cleaning_fee, onChange:function(ev){updateQ('cleaning_fee',ev.target.value);} })
            )
          ),
          pn > 0 && e('div', { style:{background:'var(--bg-light)',borderRadius:'6px',padding:'0.6rem 0.9rem',marginBottom:'1rem',fontWeight:600,color:'var(--primary-blue)'} },
            'Total estimate: €' + pn + ' × ' + nights + ' nights' + (quoteForm.cleaning_fee ? ' + €' + quoteForm.cleaning_fee + ' cleaning' : '') + ' = €' + autoTotal.toFixed(0)
          ),
          e('div', { style:{marginBottom:'1rem'} },
            e('label', { style:labelStyle }, 'Your message to the guest'),
            e('textarea', { style:Object.assign({},inputStyle,{height:'80px',resize:'vertical'}), placeholder:'Tell the guest about your property, any included services, or a personal welcome note...', value:quoteForm.host_message, onChange:function(ev){updateQ('host_message',ev.target.value);} })
          ),
          e('div', { style:{marginBottom:'1rem'} },
            e('label', { style:labelStyle }, 'Quote valid for'),
            e('div', { style:{display:'flex',gap:'8px'} },
              [{v:24,l:'24h'},{v:48,l:'48h'},{v:72,l:'72h'}].map(function(opt){
                return e('button',{key:opt.v,type:'button',style:{padding:'6px 14px',borderRadius:'20px',border:'1px solid '+(quoteForm.valid_hours===opt.v?'var(--primary-blue)':'#ddd'),background:quoteForm.valid_hours===opt.v?'var(--primary-blue)':'#f9f9f9',color:quoteForm.valid_hours===opt.v?'white':'#444',cursor:'pointer',fontSize:'0.85rem'},onClick:function(){updateQ('valid_hours',opt.v);}}, opt.l);
              })
            )
          ),
          e('h3', { style:{marginBottom:'0.8rem',color:'#444',fontSize:'0.95rem'} }, '📞 Your Contact Details (shared with guest only on acceptance)'),
          e('div', { style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'1rem'} },
            e('div', null, e('label', { style:labelStyle }, 'Email *'), e('input', { type:'email', style:inputStyle, placeholder:'host@email.com', value:quoteForm.host_email, onChange:function(ev){updateQ('host_email',ev.target.value);} })),
            e('div', null, e('label', { style:labelStyle }, 'Phone'), e('input', { type:'tel', style:inputStyle, placeholder:'+39 333 1234567', value:quoteForm.host_phone, onChange:function(ev){updateQ('host_phone',ev.target.value);} }))
          ),
          e('div', null, e('label', { style:labelStyle }, 'Your booking website (optional)'), e('input', { type:'url', style:inputStyle, placeholder:'https://yourproperty.com', value:quoteForm.host_website, onChange:function(ev){updateQ('host_website',ev.target.value);} }))
        ),

        formError && e('div', { style:{color:'var(--error)',margin:'0.5rem 0',fontSize:'0.88rem',background:'#fef2f2',padding:'0.5rem 0.8rem',borderRadius:'6px',borderLeft:'3px solid var(--error)'} }, formError),

        e('div', { style:{display:'flex',gap:'1rem',marginTop:'0.5rem'} },
          e('button', {
            type:'button', className:'cta-button',
            style:{flex:2, padding:'0.8rem', opacity:submitting?0.7:1, cursor:submitting?'not-allowed':'pointer'},
            onClick:handleSubmitQuote, disabled:submitting
          }, submitting ? 'Sending...' : '📤 Send My Quote'),
          e('button', {
            type:'button',
            style:{flex:1, padding:'0.8rem', border:'1px solid #fca5a5', background:'#fef2f2', color:'var(--error)', borderRadius:'8px', cursor:'pointer', fontWeight:600},
            onClick:handleDecline
          }, '✗ Not available')
        ),

        e('div', { style:{marginTop:'1.5rem',background:'#f9fafb',border:'1px solid #e5e7eb',borderRadius:'10px',padding:'1rem',fontSize:'0.82rem',color:'#6b7280'} },
          e('p', { style:{fontWeight:600,color:'#374151',marginBottom:'0.4rem'} }, '💡 Want automatic availability checks?'),
          e('p', null, 'Connect your Google Calendar in your dashboard and we\'ll automatically verify your availability for future requests — no manual checking needed.'),
          e('a', { href:'#/dashboard', style:{color:'var(--primary-blue)',fontWeight:600} }, 'Set up calendar in dashboard →')
        )
      );
    }

    function App(props) {
      var stateListings = useState([]);
      var listings = stateListings[0];
      var setListings = stateListings[1];
      var stateCurrentPage = useState('home');
      var currentPage = stateCurrentPage[0];
      var setCurrentPage = stateCurrentPage[1];
      var statePageState = useState({});
      var pageState = statePageState[0];
      var setPageState = statePageState[1];
      var stateUser = useState(null);
      var user = stateUser[0];
      var setUser = stateUser[1];
      var stateNavHistory = useState([]);
      var navHistory = stateNavHistory[0];
      var setNavHistory = stateNavHistory[1];
      var stateConversations = useState([]);
      var conversations = stateConversations[0];
      var setConversations = stateConversations[1];

      useEffect(function() {
        // Initial parse with whatever enrichment is already in ENRICHMENT_MAP (empty on first load)
        var parsed = parseListings();
        setListings(parsed);

        // Load enrichment async (static JSON file), then re-merge into listings
        loadEnrichmentData().then(function(enrichMap) {
          if (Object.keys(enrichMap).length > 0) {
            window.ENRICHMENT_MAP = enrichMap;
            setListings(parseListings());
          }
        });

        var savedUser = localStorage.getItem('ad_user');
        if (savedUser) {
          var u = JSON.parse(savedUser);
          setUser(u);
        }
        var parseAndRoute = function() {
          var rawHash = window.location.hash.replace('#/', '');
          var hashParts = rawHash.split('?');
          var hash = hashParts[0];
          var hashQuery = new URLSearchParams(hashParts[1] || '');
          if (hash === 'dashboard' || hash === 'map' || hash === 'admin' || hash === 'blog' || hash === 'about' || hash === 'login' || hash === 'request-quote') {
            setCurrentPage(hash);
            setPageState({});
          } else if (hash.startsWith('quote-request/')) {
            var qToken = hash.substring(14);
            if (qToken) { setCurrentPage('quote-request'); setPageState({ guestToken: qToken }); }
          } else if (hash.startsWith('respond-to-quote/')) {
            var rToken = hash.substring(17);
            if (rToken) { setCurrentPage('respond-to-quote'); setPageState({ respondToken: rToken }); }
          } else if (hash === 'search') {
            var cityParam = hashQuery.get('city') || '';
            setCurrentPage('search');
            setPageState(cityParam ? { initialCity: cityParam } : {});
          } else if (hash.startsWith('blog/')) {
            var postSlug = hash.substring(5);
            if (postSlug) {
              setCurrentPage('blogpost');
              setPageState({ postSlug: postSlug });
            }
          } else if (hash.startsWith('property/') || hash.startsWith('book-direct/')) {
            var isBookDirect = hash.startsWith('book-direct/');
            var propPath = hash.substring(isBookDirect ? 12 : 9);
            var propId = propPath.split('/')[0];
            if (propId) {
              setCurrentPage('detail');
              setPageState({ propertyId: propId, bookDirect: isBookDirect });
            }
          } else if (hash.startsWith('unsubscribe')) {
            setCurrentPage('unsubscribe');
            var uParams = new URLSearchParams(hash.split('?')[1] || '');
            setPageState({ unsubEmail: uParams.get('email') || '' });
          } else {
            setCurrentPage('home');
            setPageState({});
          }
        };
        parseAndRoute();
        window.addEventListener('hashchange', parseAndRoute);
        var savedConvs = localStorage.getItem('ad_conversations');
        if (savedConvs) {
          setConversations(JSON.parse(savedConvs));
        }
        // UTM tracking for outreach campaigns
        var urlParams = new URLSearchParams(window.location.search);
        var utmSource = urlParams.get('utm_source');
        if (utmSource) {
          var trackEntry = {
            timestamp: new Date().toISOString(),
            source: utmSource,
            medium: urlParams.get('utm_medium') || '',
            campaign: urlParams.get('utm_campaign') || '',
            content: urlParams.get('utm_content') || '',
            page: window.location.hash || '#/home'
          };
          var tracks = JSON.parse(localStorage.getItem('dbi_outreach_tracks') || '[]');
          tracks.push(trackEntry);
          localStorage.setItem('dbi_outreach_tracks', JSON.stringify(tracks));
          var stats = JSON.parse(localStorage.getItem('dbi_outreach_stats') || '{"emailsSent":0,"whatsappSent":0,"linkClicks":0,"claims":0}');
          stats.linkClicks = (stats.linkClicks || 0) + 1;
          localStorage.setItem('dbi_outreach_stats', JSON.stringify(stats));
        }
        return function() { window.removeEventListener('hashchange', parseAndRoute); };
      }, []);

      var currentProperty = useMemo(function() {
        if (currentPage !== 'detail' || !pageState.propertyId) return null;
        return listings.find(function(p) { return p.id === pageState.propertyId; });
      }, [listings, currentPage, pageState]);

      var handleNavigate = function(page, state) {
        var newHistory = navHistory.slice();
        newHistory.push({ page: currentPage, state: pageState });
        setNavHistory(newHistory);
        setCurrentPage(page);
        if (state) setPageState(state);
        if (page === 'blogpost' && state && state.postSlug) {
          window.location.hash = '#/blog/' + state.postSlug;
        } else {
          window.location.hash = '#/' + page;
        }
        window.scrollTo(0, 0);
      };

      var handleBack = function() {
        if (navHistory.length > 0) {
          var prev = navHistory[navHistory.length - 1];
          setNavHistory(navHistory.slice(0, -1));
          setCurrentPage(prev.page);
          if (prev.state) setPageState(prev.state);
        } else {
          setCurrentPage('home');
        }
      };

      var handleSelectProperty = function(prop) {
        var newHistory = navHistory.slice();
        newHistory.push({ page: currentPage, state: pageState });
        setNavHistory(newHistory);
        setCurrentPage('detail');
        setPageState({ propertyId: prop.id });
        var slug = (prop.name || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').substring(0, 30);
        var route = (prop.website || prop.googleImage) ? 'book-direct' : 'property';
        window.location.hash = '#/' + route + '/' + prop.id + '/' + slug;
        window.scrollTo(0, 0);
      };

      var handleLogout = function() {
        localStorage.removeItem('ad_user');
        setUser(null);
        setCurrentPage('home');
        window.location.hash = '#/home';
      };

      var handlePropertySaved = function() {
        // Trigger any necessary updates
      };

      return e('div', null,
        e(Navbar, { currentPage: currentPage, onNavigate: handleNavigate, user: user, onLogout: handleLogout, conversations: conversations }),
        currentPage === 'home' ? e(HomePage, { listings: listings, onSelectProperty: handleSelectProperty, onNavigate: handleNavigate }) :
        currentPage === 'search' ? e(SearchPage, { listings: listings, onSelectProperty: handleSelectProperty, onNavigate: function() { handleNavigate('home'); }, initialCity: pageState && pageState.initialCity ? pageState.initialCity : '' }) :
        currentPage === 'map' ? e(MapPage, { listings: listings, onSelectProperty: handleSelectProperty, onNavigate: function() { handleNavigate('home'); } }) :
        currentPage === 'detail' ? e(PropertyDetail, { currentProperty: currentProperty, onNavigate: handleNavigate, handleBack: handleBack, user: user, onPropertySaved: handlePropertySaved }) :
        currentPage === 'login' ? e(LoginPage, { onLogin: function(u) { setUser(u); var prev = navHistory.length > 0 ? navHistory[navHistory.length - 1] : null; if (prev && prev.page === 'detail') { setCurrentPage(prev.page); if (prev.state) setPageState(prev.state); } else { setCurrentPage('dashboard'); } } }) :
        currentPage === 'dashboard' ? e(Dashboard, { user: user, onLogout: handleLogout, listings: listings }) :
        currentPage === 'admin' ? e(AdminPanel, { listings: listings, onBack: function() { handleNavigate('home'); } }) :
        currentPage === 'blog' ? e(BlogPage, { onNavigate: handleNavigate }) :
        currentPage === 'blogpost' ? e(BlogPost, { slug: pageState.postSlug, handleBack: function() { handleNavigate('blog'); }, onNavigate: handleNavigate }) :
        currentPage === 'about' ? e(AboutPage, { onNavigate: handleNavigate }) :
        currentPage === 'request-quote' ? e(RFQPage, { onNavigate: handleNavigate, user: user, listings: listings }) :
        currentPage === 'quote-request' ? e(RFQTrackingPage, { token: pageState.guestToken }) :
        currentPage === 'respond-to-quote' ? e(HostQuotePage, { respondToken: pageState.respondToken }) :
        currentPage === 'unsubscribe' ? (function() {
          var unsubEmail = pageState.unsubEmail || '';
          var stateUnsub = useState(false);
          var unsubDone = stateUnsub[0];
          var setUnsubDone = stateUnsub[1];
          var handleUnsub = function() {
            var unsubs = JSON.parse(localStorage.getItem('dbi_unsubscribed') || '[]');
            if (unsubs.indexOf(unsubEmail) === -1) unsubs.push(unsubEmail);
            localStorage.setItem('dbi_unsubscribed', JSON.stringify(unsubs));
            setUnsubDone(true);
          };
          return e('div', { style: { maxWidth: '500px', margin: '4rem auto', padding: '2rem', textAlign: 'center' } },
            e('h2', null, 'Unsubscribe'),
            !unsubDone ? e('div', null,
              e('p', { style: { color: '#666', marginBottom: '1rem' } }, 'Unsubscribe ' + (unsubEmail || 'this address') + ' from DirectBookingsItaly.com emails?'),
              e('button', { className: 'cta-button', onClick: handleUnsub, style: { background: '#dc2626' } }, 'Confirm Unsubscribe'),
              e('p', { style: { color: '#999', fontSize: '0.85rem', marginTop: '1rem' } }, 'You will no longer receive outreach emails from us.')
            ) : e('div', null,
              e('p', { style: { color: '#2e7d32', fontWeight: 600, fontSize: '1.1rem' } }, 'You have been unsubscribed.'),
              e('p', { style: { color: '#666', marginTop: '0.5rem' } }, 'We will not send any more emails to this address.'),
              e('a', { href: '#/home', style: { color: 'var(--primary-blue)', marginTop: '1rem', display: 'inline-block' } }, 'Go to homepage')
            )
          );
        })() :
        e('div', null),
        e(Footer, null)
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App, null));
  </script>
</body>
</html>
