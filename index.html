    .btn { padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
    .btn-primary { background: var(--orange); color: white; }
    .btn-primary:hover { background: #a83f1e; transform: translateY(-1px); }

    .btn-outline { background: transparent; border: 1px solid var(--orange); color: var(--orange); }
    .btn-outline:hover { background: #fff5f0; }

    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-primary { background: #e8f4f8; color: var(--blue); }
    .badge-success { background: #e8f5e9; color: var(--green); }
    .badge-warning { background: #fff3e0; color: #e65100; }

    .chip.active { background: var(--orange); color: white; border-color: var(--orange); }
    .chip:hover { background: #e0e0e0; }
    .chip.active:hover { background: #a83f1e; }

    .modal.active { display: flex; align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 32px; border-radius: 12px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }

    .stats-bar { background: white; padding: 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; text-align: center; margin: 32px 0; }

        var propId = d[0];
        return {
          id: propId,
          region: window.REGIONS[d[1]],
          regionCode: d[1],
          provincia: window.PROVINCES[d[2]],
          provinciaCode: d[2],
          comune: d[3],
          type: window.PROPERTY_TYPES[d[4]],
          typeCode: d[4],
          name: d[5],
          street: d[6],
          number: d[7],
          cap: d[8],
          lat: d[9],
          lon: d[10],
          stars: d[11] || 0,
          beds: d[12] || 0,
          rooms: d[13] || 0,
          baths: d[14] || 0,
          website: d[15] || '',
          amenities: {
            ac: !!(amenBits & 2), pool: !!(amenBits & 4),
            paidParking: !!(amenBits & 8), freeParking: !!(amenBits & 16),
            restaurant: !!(amenBits & 32),
            elevator: !!(amenBits & 128), garage: !!(amenBits & 256),
            pets: !!(amenBits & 1024),
            disability: !!(amenBits & 2048), sauna: !!(amenBits & 4096),
            tennis: !!(amenBits & 8192), bikeRental: !!(amenBits & 16384),
            indoorPool: !!(amenBits & 32768), gym: !!(amenBits & 131072),
            shuttle: !!(amenBits & 2097152)
          },
          languages: {
            en: !!(langBits & 1), fr: !!(langBits & 2), de: !!(langBits & 4),
            es: !!(langBits & 8), ru: !!(langBits & 16), zh: !!(langBits & 32)
          },
          claimed: CLAIMED_IDS.has(propId),
          verified: CLAIMED_IDS.has(propId)
        };
      });
      return listings.map(function(p) {
        return Object.assign({}, p, { neighborhood: getNeighborhood(p) });
      }).sort(function(a, b) {
        if (a.claimed && !b.claimed) return -1;
        if (!a.claimed && b.claimed) return 1;
        return 0;
      });
    }

    function ensureUrl(url) {
      if (!url) return '';
      if (url.startsWith('http://') || url.startsWith('https://')) return url;
      return 'https://' + url;
    }

    function getCardImage(prop) {
      return PROPERTY_PHOTOS[prop.typeCode] || PROPERTY_PHOTOS[7];
    }

    function getHeroImage(prop) {
      return REGION_PHOTOS[prop.regionCode] || REGION_PHOTOS[0];
    }

    function buildCommunesByRegion(listings) {
      var map = {};
      listings.forEach(function(l) {
        if (!map[l.regionCode]) map[l.regionCode] = new Set();
        map[l.regionCode].add(l.comune);
      });
      Object.keys(map).forEach(function(k) { map[k] = Array.from(map[k]).sort(); });
      return map;
    }

    function buildCommunesByAllRegions(listings) {
      var allCommunes = new Set();
      listings.forEach(function(l) {
        allCommunes.add(l.comune);
      });
      return Array.from(allCommunes).sort();
    }

    function buildNeighborhoodsByComune(listings) {
      var map = {};
      listings.forEach(function(l) {
        var key = l.comune;
        if (!map[key]) map[key] = new Set();
        map[key].add(l.neighborhood);
      });
      Object.keys(map).forEach(function(k) { map[k] = Array.from(map[k]).sort(); });
      return map;
    }

    function getTopAmenities(prop, limit) {
      if (!limit) limit = 3;
      var amenities = Object.entries(prop.amenities).filter(function(a) { return a[1]; }).map(function(a) { return AMENITY_LABELS[a[0]]; });
      return amenities.slice(0, limit);
    }

    function renderStars(stars) {
      return '★'.repeat(stars) + '☆'.repeat(5 - stars);
    }

    function smartPagination(current, total) {
      var pages = [];
      var maxShow = 7;
      if (total <= maxShow) {
        for (var i = 1; i <= total; i++) pages.push(i);
      } else {
        pages.push(1);
        var start = Math.max(2, current - 2);
        var end = Math.min(total - 1, current + 2);
        if (start > 2) pages.push('...');
        for (var i = start; i <= end; i++) pages.push(i);
        if (end < total - 1) pages.push('...');
        pages.push(total);
      }
      return pages;
    }

    /* ---- PROPERTY DETAIL ---- */
    function PropertyDetail(props) {
      var prop = props.prop;
      var onNavigate = props.onNavigate;
      var user = props.user;

      var showProposalState = useState(false);
      var proposalDataState = useState({ name: user?.name || '', email: user?.email || '', checkIn: '', checkOut: '', guests: 1, message: '' });
      var submittedState = useState(false);

      var showProposal = showProposalState[0];
      var setShowProposal = showProposalState[1];
      var proposalData = proposalDataState[0];
      var setProposalData = proposalDataState[1];
      var submitted = submittedState[0];
      var setSubmitted = submittedState[1];

      var handleProposalSubmit = function() {
        if (!proposalData.name || !proposalData.email || !proposalData.checkIn || !proposalData.checkOut) {
          alert('Please fill all fields');
          return;
        }
        var proposals = JSON.parse(localStorage.getItem('ad_proposals') || '[]');
        proposals.push(Object.assign({ propertyId: prop.id, submitted: new Date().toISOString() }, proposalData));
        localStorage.setItem('ad_proposals', JSON.stringify(proposals));
        setSubmitted(true);
      };

      var heroImg = getHeroImage(prop);

      return e('div', null,
        e('div', { style: { backgroundImage: 'url(' + heroImg + ')', backgroundSize: 'cover', backgroundPosition: 'center', height: '400px', position: 'relative', display: 'flex', alignItems: 'flex-end', padding: '32px', color: 'white' } },
          e('div', { className: 'sample-photo-label', style: { zIndex: 2 } }, 'Sample Photo'),
          e('div', { style: { background: 'rgba(0,0,0,0.6)', padding: '24px', borderRadius: '8px', maxWidth: '600px' } },
            e('h1', { style: { fontSize: '36px', fontWeight: '700', margin: '0 0 8px 0' } }, prop.name),
            e('p', { style: { margin: '0 0 8px 0', fontSize: '16px' } }, prop.type + ' • ' + prop.neighborhood + ', ' + prop.region),
            prop.claimed && e('span', { style: { background: '#2a6847', color: 'white', padding: '4px 12px', borderRadius: '12px', fontSize: '12px', fontWeight: '600' } }, 'Verified Owner')
          )
        ),
        e('div', { style: { maxWidth: '1200px', margin: '0 auto', padding: '32px 24px' } },
          e('div', { style: { display: 'grid', gridTemplateColumns: '2fr 1fr', gap: '32px' } },
            e('div', null,
              e('div', { style: { marginBottom: '32px' } },
                e('h2', null, 'Property Details'),
                e('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '16px', marginTop: '16px' } },
                  e('div', null, e('strong', null, 'Rating'), e('div', { className: 'stars', title: prop.stars + ' stars' }, renderStars(prop.stars))),
                  e('div', null, e('strong', null, 'Beds'), e('div', { style: { fontSize: '20px', fontWeight: '700', color: 'var(--orange)' } }, prop.beds)),
                  e('div', null, e('strong', null, 'Rooms'), e('div', { style: { fontSize: '20px', fontWeight: '700', color: 'var(--orange)' } }, prop.rooms)),
                  e('div', null, e('strong', null, 'Bathrooms'), e('div', { style: { fontSize: '20px', fontWeight: '700', color: 'var(--orange)' } }, prop.baths)),
                  prop.claimed && e('div', null, e('strong', null, 'Status'), e('div', { style: { fontSize: '14px' } }, e('span', { className: 'badge badge-success' }, '✓ Verified')))
                )
              ),
              e('div', { style: { marginBottom: '32px' } },
                e('h2', null, 'Address'),
                e('p', null, (prop.street || '') + ' ' + (prop.number || '')),
                e('p', null, prop.cap + ' ' + prop.comune),
                e('p', null, prop.provincia + ', ' + prop.region)
              ),
              e('div', { style: { marginBottom: '32px' } },
                e('h2', null, 'Amenities'),
                e('div', { className: 'amenities-chips' },
                  Object.entries(prop.amenities).filter(function(a) { return a[1]; }).map(function(a) {
                    return e('span', { className: 'amenity-chip', key: a[0] }, AMENITY_LABELS[a[0]]);
                  })
                )
              ),
              prop.lat && prop.lon && e('div', { style: { marginBottom: '32px' } },
                e('h2', null, 'Location'),
                e('div', { id: 'detail-map', style: { height: '300px', borderRadius: '8px', overflow: 'hidden', marginTop: '16px' } },
                  e(MapEmbed, { lat: prop.lat, lon: prop.lon, key: prop.id })
                )
              )
            ),
            e('div', null,
              e('div', { className: 'contact-section' },
                e('h3', null, 'Rates & Contact'),
                prop.website ? e('div', null,
                  e('p', { style: { fontSize: '13px', color: '#666', marginBottom: '16px' } }, 'Check the property website for current rates and availability.'),
                  e('a', { href: ensureUrl(prop.website), target: '_blank', rel: 'noopener noreferrer', className: 'btn btn-primary', style: { width: '100%', textAlign: 'center', textDecoration: 'none', display: 'block', marginBottom: '16px' } }, 'Visit Website')
                ) : e('p', { style: { fontSize: '13px', color: '#666', marginBottom: '16px' } }, 'Contact the property directly for rates and availability.'),
                e('h3', { style: { marginTop: '20px' } }, 'Send Proposal'),
                submitted ? e('div', { style: { padding: '16px', background: '#e8f5e9', borderRadius: '8px', color: '#2a6847' } },
                  e('strong', null, 'Proposal Sent!'),
                  e('p', { style: { marginTop: '8px', fontSize: '13px' } },
                    'Your proposal has been sent. The property owner will need to claim their listing on AffittoDiretto to view your contact details.'
                  )
                ) : e('div', null,
                  e('div', { style: { marginBottom: '12px' } },
                    e('input', { type: 'text', className: 'input', placeholder: 'Name', value: proposalData.name, onChange: function(e) { setProposalData(Object.assign({}, proposalData, { name: e.target.value })); } })
                  ),
                  e('div', { style: { marginBottom: '12px' } },
                    e('input', { type: 'email', className: 'input', placeholder: 'Email', value: proposalData.email, onChange: function(e) { setProposalData(Object.assign({}, proposalData, { email: e.target.value })); } })
                  ),
                  e('div', { style: { marginBottom: '12px' } },
                    e('label', { style: { fontSize: '12px', fontWeight: '600' } }, 'Check-In'),
                    e('input', { type: 'date', className: 'input', value: proposalData.checkIn, onChange: function(e) { setProposalData(Object.assign({}, proposalData, { checkIn: e.target.value })); } })
                  ),
                  e('div', { style: { marginBottom: '12px' } },
                    e('label', { style: { fontSize: '12px', fontWeight: '600' } }, 'Check-Out'),
                    e('input', { type: 'date', className: 'input', value: proposalData.checkOut, onChange: function(e) { setProposalData(Object.assign({}, proposalData, { checkOut: e.target.value })); } })
                  ),
                  e('div', { style: { marginBottom: '12px' } },
                    e('input', { type: 'number', className: 'input', placeholder: 'Guests', min: 1, value: proposalData.guests, onChange: function(e) { setProposalData(Object.assign({}, proposalData, { guests: parseInt(e.target.value) })); } })
                  ),
                  e('div', { style: { marginBottom: '12px' } },
                    e('textarea', { className: 'input', placeholder: 'Message (optional)', rows: 4, value: proposalData.message, onChange: function(e) { setProposalData(Object.assign({}, proposalData, { message: e.target.value })); } })
                  ),
                  e('button', { className: 'btn btn-primary', style: { width: '100%' }, onClick: handleProposalSubmit }, 'Send Proposal')
                )
              )
            )
          )
        ),
        e(Footer)
      );
    }

    function MapEmbed(props) {
      var lat = props.lat;
      var lon = props.lon;
      var mapRef = useRef(null);
      useEffect(function() {
        if (!mapRef.current) return;
        var map = L.map(mapRef.current).setView([lat, lon], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        L.circleMarker([lat, lon], { radius: 8, color: 'var(--orange)', fillColor: 'var(--orange)', fillOpacity: 0.7 }).addTo(map);
        return function() { map.remove(); };
      }, [lat, lon]);
      return e('div', { ref: mapRef, style: { width: '100%', height: '100%' } });
    }

    /* ---- LOGIN/SIGNUP ---- */
    function LoginPage(props) {
      var onNavigate = props.onNavigate;
      var user = props.user;
      var setUser = props.setUser;

      var modeState = useState('login');
      var emailState = useState('');
      var passwordState = useState('');
      var nameState = useState('');
      var userTypeState = useState('tourist');

      var mode = modeState[0];
      var setMode = modeState[1];
      var email = emailState[0];
      var setEmail = emailState[1];
      var password = passwordState[0];
      var setPassword = passwordState[1];
      var name = nameState[0];
      var setName = nameState[1];
      var userType = userTypeState[0];
      var setUserType = userTypeState[1];

      var handleSubmit = function() {
        if (!email || !password || (mode === 'signup' && !name)) {
          alert('Please fill all fields');
          return;
        }
        var users = JSON.parse(localStorage.getItem('ad_users') || '[]');
        if (mode === 'login') {
          var found = users.find(function(u) { return u.email === email && u.password === password; });
          if (!found) { alert('Invalid credentials'); return; }
          localStorage.setItem('ad_current_user', JSON.stringify(found));
          if (setUser) setUser(found);
          onNavigate('home');
        } else {
          if (users.some(function(u) { return u.email === email; })) { alert('Email already registered'); return; }
          var newUser = { id: 'user_' + Date.now(), name: name, email: email, password: password, userType: userType, created: new Date().toISOString() };
          users.push(newUser);
          localStorage.setItem('ad_users', JSON.stringify(users));
          localStorage.setItem('ad_current_user', JSON.stringify(newUser));
          if (setUser) setUser(newUser);
          onNavigate('home');
        }
      };

      return e('div', { style: { maxWidth: '500px', margin: '60px auto', padding: '24px' } },
        e('div', { className: 'card', style: { padding: '32px' } },
          e('h1', { style: { textAlign: 'center', marginBottom: '24px' } }, mode === 'login' ? 'Login' : 'Sign Up'),
          e('div', { style: { marginBottom: '20px', display: 'flex', gap: '12px', justifyContent: 'center' } },
            e('button', { className: 'btn' + (mode === 'login' ? ' btn-primary' : ' btn-secondary'), onClick: function() { setMode('login'); } }, 'Login'),
            e('button', { className: 'btn' + (mode === 'signup' ? ' btn-primary' : ' btn-secondary'), onClick: function() { setMode('signup'); } }, 'Sign Up')
          ),
          mode === 'signup' && e('div', { style: { marginBottom: '12px' } },
            e('label', { style: { display: 'block', marginBottom: '8px', fontWeight: '600' } }, 'I am a...'),
            e('select', { value: userType, onChange: function(e) { setUserType(e.target.value); }, className: 'input' },
              e('option', { value: 'tourist' }, 'Traveler/Guest'),
              e('option', { value: 'owner' }, 'Property Owner')
            )
          ),
          mode === 'signup' && e('input', { type: 'text', className: 'input', placeholder: 'Full Name', value: name, onChange: function(e) { setName(e.target.value); }, style: { marginBottom: '12px' } }),
          e('input', { type: 'email', className: 'input', placeholder: 'Email', value: email, onChange: function(e) { setEmail(e.target.value); }, style: { marginBottom: '12px' } }),
          e('input', { type: 'password', className: 'input', placeholder: 'Password', value: password, onChange: function(e) { setPassword(e.target.value); }, style: { marginBottom: '12px' } }),
          e('button', { className: 'btn btn-primary', onClick: handleSubmit, style: { width: '100%', marginBottom: '12px' } }, mode === 'login' ? 'Login' : 'Create Account'),
          e('div', { style: { textAlign: 'center', fontSize: '13px', color: '#666' } },
            mode === 'login' ? 'No account? ' : 'Have account? ',
            e('a', { onClick: function() { setMode(mode === 'login' ? 'signup' : 'login'); setEmail(''); setPassword(''); setName(''); }, style: { color: 'var(--orange)', cursor: 'pointer', textDecoration: 'none' } }, mode === 'login' ? 'Sign up' : 'Login')
          )
        ),
        e(Footer)
      );
    }

    /* ---- DASHBOARD ---- */
    function Dashboard(props) {
      var user = props.user;
      var listings = props.listings;
      var onNavigate = props.onNavigate;

      var activeTabState = useState('profile');
      var activeTab = activeTabState[0];
      var setActiveTab = activeTabState[1];

      return e('div', { style: { maxWidth: '1000px', margin: '0 auto', padding: '32px 24px' } },
        e('h1', { style: { marginBottom: '24px' } }, 'Dashboard'),
        e('div', null,
          e('button', { className: 'tab' + (activeTab === 'profile' ? ' active' : ''), onClick: function() { setActiveTab('profile'); } }, 'Profile'),
          user.userType === 'owner' && e('button', { className: 'tab' + (activeTab === 'properties' ? ' active' : ''), onClick: function() { setActiveTab('properties'); } }, 'My Properties'),
          e('button', { className: 'tab' + (activeTab === 'proposals' ? ' active' : ''), onClick: function() { setActiveTab('proposals'); } }, 'Proposals')
        ),
        e('div', { style: { marginTop: '24px', padding: '24px', background: 'white', borderRadius: '8px' } },
          activeTab === 'profile' && e('div', null,
            e('h2', null, 'Profile'),
            e('p', null, 'Name: ' + user.name),
            e('p', null, 'Email: ' + user.email),
            e('p', null, 'Type: ' + (user.userType === 'owner' ? 'Property Owner' : 'Traveler')),
            e('p', { style: { fontSize: '13px', color: '#666' } }, 'Member since ' + new Date(user.created).toLocaleDateString())
          ),
          activeTab === 'properties' && e('div', null,
            e('h2', null, 'My Properties'),
            e('p', { style: { color: '#666' } }, 'You have not yet claimed any properties.')
          ),
          activeTab === 'proposals' && e('div', null,
            e('h2', null, 'My Proposals'),
            e('p', { style: { color: '#666' } }, 'You have no submitted proposals yet.')
          )
        ),
        e(Footer)
      );
    }

    function Footer() {
      return e('footer', { className: 'footer' },
        e('p', null, '© 2026 AffittoDiretto.it - Direct booking platform for Italy'),
        e('p', { style: { fontSize: '12px', marginTop: '8px' } }, 'No commission. Book directly with property owners.')
      );
    }

    /* ---- MAIN APP ---- */
    function App() {
      var pageState = useState('home');
      var listingsState = useState([]);
      var loadingState = useState(true);
      var userState = useState(null);

      var page = pageState[0];
      var setPage = pageState[1];
      var listings = listingsState[0];
      var setListings = listingsState[1];
      var loading = loadingState[0];
      var setLoading = loadingState[1];
      var user = userState[0];
      var setUser = userState[1];

      useEffect(function() {
        var parsed = parseListings();
        setListings(parsed);
        setLoading(false);
        var stored = localStorage.getItem('ad_current_user');
        if (stored) setUser(JSON.parse(stored));
        window.scrollTo(0, 0);
      }, []);

      var handleNavigate = function(newPage) {
        setPage(newPage);
        window.scrollTo(0, 0);
      };

      var handlePropertyClick = function(propId) {
        var prop = listings.find(function(l) { return l.id === propId; });
        if (prop) {
          sessionStorage.setItem('ad_current_property', JSON.stringify(prop));
          handleNavigate('detail');
        }
      };

      if (loading) return e('div', { style: { padding: '40px', textAlign: 'center' } }, e('div', { className: 'spinner' }), e('p', { style: { marginTop: '20px' } }, 'Loading 63,000 properties...'));

      var currentProp = page === 'detail' ? JSON.parse(sessionStorage.getItem('ad_current_property') || 'null') : null;

      return e('div', null,
        e(Nav, { onNavigate: handleNavigate, currentPage: page, user: user, setUser: setUser }),
        page === 'home' && e(HomePage, { listings: listings, onNavigate: handleNavigate, onPropertyClick: handlePropertyClick }),
        page === 'search' && e(SearchPage, { listings: listings, onPropertyClick: handlePropertyClick, onNavigate: handleNavigate }),
        page === 'map' && e(MapPage, { listings: listings }),
        page === 'detail' && currentProp && e(PropertyDetail, { prop: currentProp, onNavigate: handleNavigate, user: user }),
        page === 'login' && e(LoginPage, { onNavigate: handleNavigate, user: user, setUser: setUser }),
        page === 'dashboard' && user && e(Dashboard, { user: user, listings: listings, onNavigate: handleNavigate })
      );
    }

    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>
</html>
