<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AffittoDiretto.it - Book Direct in Italy</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="data_public.js"></script>
  <style>
    :root {
      --primary-blue: #003580;
      --primary-blue-light: #0066d4;
      --secondary-orange: #c4652a;
      --secondary-orange-light: #ff9500;
      --text-dark: #222;
      --text-light: #666;
      --border-light: #ddd;
      --bg-light: #f5f5f5;
      --success: #0d7377;
      --error: #dc2626;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color: var(--text-dark);
      background: #fff;
    }

    /* NAVBAR */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #fff;
      border-bottom: 1px solid var(--border-light);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 0.75rem 2rem;
    }

    .navbar-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto;
    }

    .navbar-logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary-blue);
      cursor: pointer;
      text-decoration: none;
    }

    .navbar-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .navbar-link {
      color: var(--text-dark);
      text-decoration: none;
      cursor: pointer;
      font-size: 0.95rem;
      padding: 0.5rem 0;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      position: relative;
    }

    .navbar-link:hover {
      color: var(--primary-blue);
      border-bottom-color: var(--primary-blue);
    }

    .navbar-link.active {
      color: var(--primary-blue);
      border-bottom-color: var(--primary-blue);
    }

    .unread-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--error);
      color: #fff;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-left: 0.3rem;
    }

    .btn-primary {
      background: var(--primary-blue);
      color: #fff;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background: var(--primary-blue-light);
    }

    .btn-secondary {
      background: transparent;
      color: var(--primary-blue);
      border: 1px solid var(--primary-blue);
      padding: 0.6rem 1.2rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: var(--primary-blue);
      color: #fff;
    }

    /* HERO SECTION */
    .hero {
      background: linear-gradient(135deg, var(--primary-blue) 0%, #004ba8 100%);
      color: #fff;
      padding: 4rem 2rem;
      text-align: center;
    }

    .hero-content {
      max-width: 1000px;
      margin: 0 auto;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .hero p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      opacity: 0.95;
    }

    .search-bar {
      display: flex;
      gap: 0.5rem;
      background: #fff;
      border-radius: 4px;
      padding: 0.5rem;
      max-width: 500px;
      margin: 0 auto;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .search-bar input, .search-bar select {
      flex: 1;
      border: none;
      padding: 0.75rem;
      font-size: 1rem;
      outline: none;
    }

    .search-bar button {
      padding: 0.75rem 1.5rem;
      background: var(--secondary-orange);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .search-bar button:hover {
      background: #a94f1f;
    }

    /* VALUE PROPS */
    .value-props {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
      max-width: 1200px;
      margin: 3rem auto;
      padding: 0 2rem;
    }

    .value-prop {
      text-align: center;
      padding: 1.5rem;
    }

    .value-prop-icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .value-prop h3 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      color: var(--primary-blue);
    }

    .value-prop p {
      font-size: 0.95rem;
      color: var(--text-light);
    }

    /* FEATURED SECTION */
    .featured-section {
      max-width: 1400px;
      margin: 3rem auto;
      padding: 0 2rem;
    }

    .section-title {
      font-size: 1.8rem;
      margin-bottom: 2rem;
      color: var(--text-dark);
    }

    .property-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }

    /* PROPERTY CARD */
    .property-card {
      border: 1px solid var(--border-light);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
      transition: all 0.3s;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .property-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      transform: translateY(-4px);
    }

    .card-image {
      position: relative;
      width: 100%;
      height: 180px;
      background: var(--bg-light);
      overflow: hidden;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .sample-label {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      border-radius: 3px;
    }

    .verified-badge {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      background: var(--success);
      color: #fff;
      padding: 0.3rem 0.6rem;
      font-size: 0.75rem;
      border-radius: 3px;
      font-weight: 600;
    }

    .price-tag {
      color: var(--secondary-orange);
      font-weight: 700;
      font-size: 1.1rem;
    }

    .price-tag-small {
      color: var(--secondary-orange);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .card-content {
      padding: 1rem;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: var(--text-dark);
    }

    .card-meta {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-bottom: 0.5rem;
    }

    .card-stars {
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
      color: #ffc107;
    }

    .card-amenities {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.5rem;
    }

    .amenity-chip {
      background: var(--bg-light);
      padding: 0.25rem 0.5rem;
      border-radius: 12px;
      font-size: 0.75rem;
      color: var(--text-dark);
    }

    /* HORIZONTAL CARD (Search Results) */
    .horizontal-card {
      display: flex;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: all 0.3s;
      cursor: pointer;
      margin-bottom: 1.5rem;
    }

    .horizontal-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .h-card-image {
      width: 280px;
      height: 200px;
      flex-shrink: 0;
      background: var(--bg-light);
      position: relative;
      overflow: hidden;
    }

    .h-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .h-card-content {
      flex: 1;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .h-card-header {
      margin-bottom: 1rem;
    }

    .h-card-name {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .h-card-meta {
      font-size: 0.9rem;
      color: var(--text-light);
      margin-bottom: 0.3rem;
    }

    .h-card-price {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--secondary-orange);
      margin-bottom: 0.5rem;
    }

    .h-card-stats {
      display: flex;
      gap: 1.5rem;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }

    .h-card-amenities {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.5rem;
    }

    .h-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .h-card-button {
      background: var(--primary-blue);
      color: #fff;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .h-card-button:hover {
      background: var(--primary-blue-light);
    }

    /* SIDEBAR FILTERS */
    .search-container {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 2rem;
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .filter-sidebar {
      background: #fff;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 1.5rem;
      height: fit-content;
      position: sticky;
      top: 80px;
    }

    .filter-group {
      margin-bottom: 1.5rem;
    }

    .filter-group:last-child {
      margin-bottom: 0;
    }

    .filter-label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
      color: var(--text-dark);
    }

    .filter-label .help-icon {
      display: inline-block;
      width: 18px;
      height: 18px;
      background: var(--primary-blue);
      color: #fff;
      border-radius: 50%;
      text-align: center;
      line-height: 18px;
      font-size: 0.75rem;
      margin-left: 0.3rem;
      cursor: pointer;
    }

    .filter-input, .filter-select {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid var(--border-light);
      border-radius: 4px;
      font-size: 0.95rem;
      font-family: inherit;
    }

    .filter-checkbox {
      width: auto;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .filter-option {
      display: flex;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .slider {
      width: 100%;
      height: 4px;
      background: var(--border-light);
      border-radius: 2px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: var(--primary-blue);
      cursor: pointer;
      border-radius: 50%;
    }

    .amenities-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .amenity-toggle {
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border-light);
      border-radius: 20px;
      background: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .amenity-toggle.active {
      background: var(--primary-blue);
      color: #fff;
      border-color: var(--primary-blue);
    }

    .results-area { flex: 1; }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: var(--bg-light);
      border-radius: 6px;
    }

    .results-count { font-size: 0.95rem; color: var(--text-light); }

    .sort-buttons { display: flex; gap: 0.5rem; }

    .sort-btn {
      padding: 0.5rem 1rem;
      background: #fff;
      border: 1px solid var(--border-light);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .sort-btn.active {
      background: var(--primary-blue);
      color: #fff;
      border-color: var(--primary-blue);
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-light);
    }

    .page-btn {
      padding: 0.5rem 0.8rem;
      border: 1px solid var(--border-light);
      background: #fff;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.9rem;
      min-width: 40px;
    }

    .page-btn.active {
      background: var(--primary-blue);
      color: #fff;
      border-color: var(--primary-blue);
    }

    .page-btn.ellipsis { cursor: default; border: none; }

    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-light);
    }

    .empty-state h3 { margin-bottom: 0.5rem; color: var(--text-dark); }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .modal {
      background: #fff;
      border-radius: 6px;
      padding: 2rem;
      max-width: 700px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-close {
      float: right;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-light);
      background: none;
      border: none;
    }

    .property-type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1rem;
    }

    .type-card {
      padding: 1rem;
      border: 1px solid var(--border-light);
      border-radius: 6px;
    }

    .type-name { font-weight: 600; color: var(--primary-blue); margin-bottom: 0.5rem; }
    .type-desc { font-size: 0.85rem; color: var(--text-light); margin-bottom: 0.5rem; line-height: 1.4; }
    .type-tax { font-size: 0.85rem; color: var(--secondary-orange); font-weight: 500; }

    /* PROPERTY DETAIL */
    .detail-page {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .detail-hero {
      position: relative;
      width: 100%;
      height: 400px;
      background: var(--bg-light);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .detail-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 2rem;
    }

    .detail-left {
      background: #fff;
      padding: 2rem;
      border-radius: 6px;
      border: 1px solid var(--border-light);
    }

    .detail-left h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: var(--text-dark);
    }

    .detail-left .property-type {
      font-size: 0.95rem;
      color: var(--text-light);
      margin-bottom: 1rem;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      background: var(--bg-light);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text-dark);
      margin: 1rem 2rem;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: var(--primary-blue);
      color: #fff;
      border-color: var(--primary-blue);
    }

    .claim-btn {
      background: var(--success);
      color: #fff;
      border: none;
      padding: 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
      margin-bottom: 1rem;
      transition: background 0.2s;
    }

    .claim-btn:hover {
      background: #0a5c5f;
    }

    .notification-banner {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 6px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
    }

    .notification-banner p {
      font-size: 0.9rem;
      color: #856404;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .info-item {
      padding: 1rem;
      background: var(--bg-light);
      border-radius: 6px;
      text-align: center;
    }

    .info-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary-blue);
    }

    .info-label {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-top: 0.3rem;
    }

    .address-section {
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border-light);
    }

    .address-label {
      font-size: 0.9rem;
      color: var(--text-light);
      margin-bottom: 0.3rem;
    }

    .address-text {
      font-size: 1rem;
      font-weight: 500;
    }

    .amenities-section h3 {
      margin-bottom: 1rem;
      color: var(--text-dark);
    }

    .map-embed {
      width: 100%;
      height: 300px;
      border-radius: 6px;
      margin-top: 1rem;
      border: 1px solid var(--border-light);
    }

    .detail-right {
      background: #fff;
      padding: 2rem;
      border-radius: 6px;
      border: 1px solid var(--border-light);
      height: fit-content;
      position: sticky;
      top: 100px;
    }

    .contact-section h3 {
      margin-bottom: 1rem;
      color: var(--text-dark);
    }

    .host-info {
      background: var(--bg-light);
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    .host-info strong {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--primary-blue);
    }

    .website-link {
      display: block;
      background: var(--primary-blue);
      color: #fff;
      padding: 0.8rem;
      text-align: center;
      text-decoration: none;
      border-radius: 4px;
      margin-bottom: 1.5rem;
      transition: background 0.2s;
    }

    .website-link:hover {
      background: var(--primary-blue-light);
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: var(--text-dark);
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid var(--border-light);
      border-radius: 4px;
      font-size: 0.9rem;
      font-family: inherit;
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-submit {
      width: 100%;
      padding: 0.8rem;
      background: var(--secondary-orange);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .form-submit:hover {
      background: #a94f1f;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .modal {
      background: #fff;
      border-radius: 6px;
      padding: 2rem;
      max-width: 700px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-close {
      float: right;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-light);
      background: none;
      border: none;
      padding: 0;
    }

    .modal-close:hover {
      color: var(--text-dark);
    }

    .modal h2 {
      margin-bottom: 1.5rem;
      color: var(--primary-blue);
      clear: both;
    }

    .property-type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1rem;
    }

    .type-card {
      padding: 1rem;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      transition: all 0.2s;
    }

    .type-card:hover {
      border-color: var(--primary-blue);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .type-name {
      font-weight: 600;
      color: var(--primary-blue);
      margin-bottom: 0.5rem;
    }

    .type-desc {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }

    .type-tax {
      font-size: 0.85rem;
      color: var(--secondary-orange);
      font-weight: 500;
    }

    /* EMAIL PREVIEW MODAL */

    };

    function getNeighborhood(prop) {
      if (prop.comune === 'VENEZIA' || prop.comune === 'Venezia') {
        if (VENICE_CAP_SESTIERI[prop.cap]) return VENICE_CAP_SESTIERI[prop.cap];
        return 'Venezia';
      }
      if (prop.comune === 'Roma' || prop.comune === 'ROMA') {
        if (ROME_CAP_NEIGHBORHOODS[prop.cap]) return ROME_CAP_NEIGHBORHOODS[prop.cap];
        return 'Roma (altri)';
      }
      return prop.comune;
    }

    function parseListings() {
      if (!window.RAW_DATA) return [];
      var CLAIMED_IDS = new Set(['IT000001','IT000005','IT000010','IT000020','IT000050','IT000100','IT000200','IT000500','IT001000','IT002000','IT003000','IT005000','IT010000','IT015000']);
      var listings = window.RAW_DATA.map(function(d) {
        var amenBits = d[16] || 0;
        var propId = d[0];
        return {
          id: propId,
          region: window.REGIONS[d[1]],
          regionCode: d[1],
          provincia: window.PROVINCES[d[2]],
          comune: d[3],
          type: window.PROPERTY_TYPES[d[4]],
          typeCode: d[4],
          name: d[5],
          street: d[6],
          number: d[7],
          cap: d[8],
          lat: d[9],
          lon: d[10],
          stars: d[11] || 0,
          beds: d[12] || 0,
          rooms: d[13] || 0,
          baths: d[14] || 0,
          website: d[15] || '',
          amenities: {
            ac: !!(amenBits & 2),
            pool: !!(amenBits & 4),
            paidParking: !!(amenBits & 8),
            freeParking: !!(amenBits & 16),
            restaurant: !!(amenBits & 32),
            elevator: !!(amenBits & 128),
            garage: !!(amenBits & 256),
            pets: !!(amenBits & 1024),
            disability: !!(amenBits & 2048),
            sauna: !!(amenBits & 4096),
            tennis: !!(amenBits & 8192),
            bikeRental: !!(amenBits & 16384),
            indoorPool: !!(amenBits & 32768),
            gym: !!(amenBits & 131072),
            shuttle: !!(amenBits & 2097152)
          },
          claimed: CLAIMED_IDS.has(propId),
          verified: CLAIMED_IDS.has(propId)
        };
      });
      return listings.map(function(p) {
        return Object.assign({}, p, { neighborhood: getNeighborhood(p) });
      }).sort(function(a, b) {
        if (a.claimed && !b.claimed) return -1;
        if (!a.claimed && b.claimed) return 1;
        return 0;
      });
    }

    function ensureUrl(url) {
      if (!url) return '';
      if (url.startsWith('http://') || url.startsWith('https://')) return url;
      return 'https://' + url;
    }

    function getCardImage(prop) {
      return PROPERTY_PHOTOS[prop.typeCode] || PROPERTY_PHOTOS[7];
    }

    function getHeroImage(prop) {
      return REGION_PHOTOS[prop.regionCode] || REGION_PHOTOS[0];
    }

    function buildCommunesByAllRegions(listings) {
      var map = {};
      listings.forEach(function(prop) {
        if (prop.region && prop.comune) {
          if (!map[prop.region]) map[prop.region] = [];
          if (map[prop.region].indexOf(prop.comune) === -1) {
            map[prop.region].push(prop.comune);
          }
        }
      });
      return map;
    }

    function buildNeighborhoodsByComune(listings, targetComune) {
      var neighborhoods = [];
      listings.forEach(function(prop) {
        if (prop.comune === targetComune && prop.neighborhood) {
          if (neighborhoods.indexOf(prop.neighborhood) === -1) {
            neighborhoods.push(prop.neighborhood);
          }
        }
      });
      return neighborhoods;
    }

    function getTopAmenities(prop) {
      var result = [];
      if (!prop || !prop.amenities) return result;
      Object.keys(prop.amenities).forEach(function(key) {
        if (prop.amenities[key] && AMENITY_LABELS[key]) {
          result.push(AMENITY_LABELS[key]);
        }
      });
      return result.slice(0, 3);
    }

    function renderStars(stars) {
      var html = '';
      for (var i = 0; i < 5; i++) {
        html += i < stars ? '★' : '☆';
      }
      return html;
    }

    function smartPagination(current, total) {
      var pages = [];
      var start = Math.max(1, current - 2);
      var end = Math.min(total, current + 2);
      if (start > 1) pages.push(1);
      if (start > 2) pages.push('...');
      for (var i = start; i <= end; i++) {
        pages.push(i);
      }
      if (end < total - 1) pages.push('...');
      if (end < total) pages.push(total);
      return pages;
    }

    function estimatePrice(prop) {
      var basePrices = {
        'Hotel': 80,
        'B&B': 55,
        'Agriturismo': 65,
        'Affittacamere': 45,
        'Campeggio': 30,
        'Residence': 70,
        'Villaggio Turistico': 85,
        'Altro': 50
      };
      var starMultipliers = {
        0: 0.7,
        1: 0.8,
        2: 0.9,
        3: 1.0,
        4: 1.5,
        5: 2.5
      };
      var base = basePrices[prop.type] || 60;
      var mult = starMultipliers[prop.stars] || 1.0;
      var price = base * mult;
      if (prop.amenities && prop.amenities.pool) price += 15;
      if (prop.amenities && prop.amenities.restaurant) price += 10;
      if (prop.amenities && prop.amenities.ac) price += 5;
      return Math.round(price);
    }

            !isHost ? e('button', { className: 'dashboard-tab' + (tab === 'messages' ? ' active' : ''), onClick: function() { setTab('messages'); } }, 'Messages', unreadMessages > 0 ? e('span', { className: 'dashboard-tab-badge' }, unreadMessages) : null) : null,
            isHost ? e('button', { className: 'dashboard-tab' + (tab === 'properties' ? ' active' : ''), onClick: function() { setTab('properties'); } }, 'My Properties') : null,
            isHost ? e('button', { className: 'dashboard-tab' + (tab === 'settings' ? ' active' : ''), onClick: function() { setTab('settings'); } }, 'Settings') : null,
            e('button', { className: 'dashboard-tab', onClick: onLogout, style: { marginLeft: 'auto' } }, 'Logout')
          ),
          e('div', { className: 'dashboard-content' },
            tab === 'profile' ? e('div', null,
              e('h2', null, 'Profile Information'),
              e('div', { className: 'profile-form' },
                e('div', { className: 'form-group' },
                  e('label', { className: 'form-label' }, 'Name'),
                  e('input', { className: 'form-input', type: 'text', value: user ? user.name : '', disabled: true })
                ),
                e('div', { className: 'form-group' },
                  e('label', { className: 'form-label' }, 'Email'),
                  e('input', { className: 'form-input', type: 'email', value: user ? user.email : '', disabled: true })
                ),
                e('div', { className: 'form-group' },
                  e('label', { className: 'form-label' }, 'Role'),
                  e('input', { className: 'form-input', type: 'text', value: user ? user.role : '', disabled: true })
                )
              )
            ) : null,
            tab === 'messages' ? e(MessagesTab, { user: user }) : null,
            tab === 'properties' && isHost ? e('div', null,
              e('h2', null, 'My Properties'),
              myProperties.length === 0 ?
                e('p', null, 'You have no claimed properties yet') :
                myProperties.map(function(prop) {
                  return e('div', { key: prop.id, style: { marginBottom: '1rem', padding: '1rem', border: '1px solid var(--border-light)', borderRadius: '4px' } },
                    e('h3', null, prop.name),
                    e('p', null, prop.type + ' in ' + prop.region)
                  );
                })
            ) : null,
            tab === 'settings' && isHost ? e(SettingsTab, { user: user, onSaveSettings: handleSaveSettings }) : null
          )
        )
      );
    }

    function LoginPage(props) {
      var onLogin = props.onLogin;
      var stateMode = useState('login');
      var mode = stateMode[0];
      var setMode = stateMode[1];
      var stateEmail = useState('');
      var email = stateEmail[0];
      var setEmail = stateEmail[1];
      var statePassword = useState('');
      var password = statePassword[0];
      var setPassword = statePassword[1];
      var stateName = useState('');
      var name = stateName[0];
      var setName = stateName[1];
      var stateRole = useState('traveler');
      var role = stateRole[0];
      var setRole = stateRole[1];
      var handleLogin = function() {
        if (!email || !password) {
          alert('Please fill in all fields');
          return;
        }
        var users = JSON.parse(localStorage.getItem('ad_users') || '[]');
        var found = users.find(function(u) { return u.email === email && u.password === password; });
        if (found) {
          localStorage.setItem('ad_user', JSON.stringify(found));
          onLogin(found);
        } else {
          alert('Invalid email or password. Please sign up first.');
        }
      };
      var handleSignup = function() {
        if (!name || !email || !password) {
          alert('Please fill in all fields');
          return;
        }
        var users = JSON.parse(localStorage.getItem('ad_users') || '[]');
        if (users.find(function(u) { return u.email === email; })) {
          alert('Email already registered. Please login instead.');
          return;
        }
        var user = {
          id: 'user-' + Date.now(),
          email: email,
          password: password,
          name: name,
          role: role,
          phone: '',
          whatsapp: '',
          shareEmail: false,
          sharePhone: false,
          shareWhatsapp: false,
          claimedProperties: []
        };
        users.push(user);
        localStorage.setItem('ad_users', JSON.stringify(users));
        localStorage.setItem('ad_user', JSON.stringify(user));
        onLogin(user);
      };
      return e('div', { className: 'login-container' },
        e('div', { className: 'login-form' },
          e('h2', null, mode === 'login' ? 'Sign In' : 'Create Account'),
          mode === 'signup' ? e('div', { className: 'form-group' },
            e('label', { className: 'form-label' }, 'Full Name'),
            e('input', { className: 'form-input', type: 'text', placeholder: 'Your name', value: name, onChange: function(evt) { setName(evt.target.value); } })
          ) : null,
          e('div', { className: 'form-group' },
            e('label', { className: 'form-label' }, 'Email'),
            e('input', { className: 'form-input', type: 'email', placeholder: 'your@email.com', value: email, onChange: function(evt) { setEmail(evt.target.value); } })
          ),
          e('div', { className: 'form-group' },
            e('label', { className: 'form-label' }, 'Password'),
            e('input', { className: 'form-input', type: 'password', placeholder: 'Password', value: password, onChange: function(evt) { setPassword(evt.target.value); } })
          ),
          mode === 'signup' ? e('div', { className: 'form-group' },
            e('label', { className: 'form-label' }, 'I am a...'),
            e('select', { className: 'form-select', value: role, onChange: function(evt) { setRole(evt.target.value); } },
              e('option', { value: 'traveler' }, 'Traveler'),
              e('option', { value: 'host' }, 'Property Owner')
            )
          ) : null,
          e('button', { className: 'form-submit', onClick: mode === 'login' ? handleLogin : handleSignup }, mode === 'login' ? 'Sign In' : 'Create Account'),
          e('div', { className: 'login-toggle' },
            e('span', null, mode === 'login' ? "Don't have an account? " : 'Already have an account? '),
            e('button', { onClick: function() { setMode(mode === 'login' ? 'signup' : 'login'); } }, mode === 'login' ? 'Sign Up' : 'Sign In')
          )
        )
      );
    }

    function Navbar(props) {
      var currentPage = props.currentPage;
      var onNavigate = props.onNavigate;
      var user = props.user;
      var onLogout = props.onLogout;
      var unreadCount = 0;
      return e('nav', { className: 'navbar' },
        e('div', { className: 'navbar-container' },
          e('a', { className: 'navbar-logo', onClick: function() { onNavigate('home'); } }, 'AffittoDiretto'),
          e('div', { className: 'navbar-links' },
            e('a', { className: 'navbar-link' + (currentPage === 'home' ? ' active' : ''), onClick: function() { onNavigate('home'); } }, 'Home'),
            e('a', { className: 'navbar-link' + (currentPage === 'search' ? ' active' : ''), onClick: function() { onNavigate('search'); } }, 'Search'),
            e('a', { className: 'navbar-link' + (currentPage === 'map' ? ' active' : ''), onClick: function() { onNavigate('map'); } }, 'Map'),
            user ? e('a', { className: 'navbar-link' + (currentPage === 'dashboard' ? ' active' : ''), onClick: function() { onNavigate('dashboard'); } }, 'Dashboard', unreadCount > 0 ? e('span', { className: 'unread-badge' }, unreadCount) : null) : null,
            !user ? e('button', { className: 'btn-primary', onClick: function() { onNavigate('login'); } }, 'Sign In') : e('button', { className: 'btn-secondary', onClick: onLogout }, 'Logout')
          )
        )
      );
    }

    function Footer(props) {
      return e('footer', { className: 'footer' },
        e('p', null, '© 2026 AffittoDiretto.it - Book Direct in Italy'),
        e('div', { className: 'footer-links' },
          e('a', { href: '#' }, 'Privacy'),
          e('a', { href: '#' }, 'Terms'),
          e('a', { href: '#' }, 'Contact')
        )
      );
    }

    function App(props) {
      var stateListings = useState([]);
      var listings = stateListings[0];
      var setListings = stateListings[1];
      var stateCurrentPage = useState('home');
      var currentPage = stateCurrentPage[0];
      var setCurrentPage = stateCurrentPage[1];
      var statePageState = useState({});
      var pageState = statePageState[0];
      var setPageState = statePageState[1];
      var stateUser = useState(null);
      var user = stateUser[0];
      var setUser = stateUser[1];
      var stateNavHistory = useState([]);
      var navHistory = stateNavHistory[0];
      var setNavHistory = stateNavHistory[1];
      useEffect(function() {
        var parsed = parseListings();
        setListings(parsed);
        var savedUser = localStorage.getItem('ad_user');
        if (savedUser) {
          setUser(JSON.parse(savedUser));
        }
      }, []);
      var currentProperty = useMemo(function() {
        if (currentPage !== 'detail' || !pageState.propertyId) return null;
        return listings.find(function(p) { return p.id === pageState.propertyId; });
      }, [listings, currentPage, pageState]);
      var handleNavigate = function(page, state) {
        var newHistory = navHistory.slice();
        newHistory.push({ page: currentPage, state: pageState });
        setNavHistory(newHistory);
        setCurrentPage(page);
        if (state) setPageState(state);
        window.scrollTo(0, 0);
      };
      var handleBack = function() {
        if (navHistory.length > 0) {
          var prev = navHistory[navHistory.length - 1];
          setNavHistory(navHistory.slice(0, -1));
          setCurrentPage(prev.page);
          if (prev.state) setPageState(prev.state);
        } else {
          setCurrentPage('home');
        }
      };
      var handleSelectProperty = function(prop) {
        var newHistory = navHistory.slice();
        newHistory.push({ page: currentPage, state: pageState });
        setNavHistory(newHistory);
        setCurrentPage('detail');
        setPageState({ propertyId: prop.id });
        window.scrollTo(0, 0);
      };
      var handleLogout = function() {
        localStorage.removeItem('ad_user');
        setUser(null);
        setCurrentPage('home');
      };
      return e('div', null,
        e(Navbar, { currentPage: currentPage, onNavigate: handleNavigate, user: user, onLogout: handleLogout }),
        currentPage === 'home' ? e(HomePage, { listings: listings, onSelectProperty: handleSelectProperty }) :
        currentPage === 'search' ? e(SearchPage, { listings: listings, onSelectProperty: handleSelectProperty, onNavigate: function() { handleNavigate('home'); } }) :
        currentPage === 'map' ? e(MapPage, { listings: listings, onSelectProperty: handleSelectProperty, onNavigate: function() { handleNavigate('home'); } }) :
        currentPage === 'detail' ? e(PropertyDetail, { currentProperty: currentProperty, onNavigate: handleNavigate, handleBack: handleBack, user: user }) :
        currentPage === 'login' ? e(LoginPage, { onLogin: function(u) { setUser(u); setCurrentPage('dashboard'); } }) :
        currentPage === 'dashboard' ? e(Dashboard, { user: user, onLogout: handleLogout, listings: listings }) :
        e('div', null),
        e(Footer, null)
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App, null));
  </script>
</body>
</html>
